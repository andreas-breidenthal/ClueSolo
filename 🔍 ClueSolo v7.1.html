/* SECTION: Sherlock++ “Hard Evidence” + Case-File Probability Model + Decision Helpers */
  /* Brief: This block is the heart of Sherlock mode: locking shown cards, locking case-file cards, computing category-normalised case-file chances, and using entropy/probability to pick suggestions and plan accusations. */
  /* Detailed:
     - What it does:
       - noteCardShown(): locks a specifically shown card to its owner and forces case-file probability to near-zero for that card.
       - noteCaseFileCard(): locks a card into the case file (solution) with near-certainty in the belief model.
       - caseFileProbNormalized(): converts raw case-file weights into a per-category distribution that sums to 1 across remaining candidates.
       - _pct/_pCaseNorm/_pOwner(): small helpers for logging and probability access.
       - entropyForCardKey(): computes an information score used to pick informative suggestion cards.
       - pickSmartSuggestionParts(): chooses suspect/weapon that maximises information gain (plus small randomness).
       - beliefsTopFor()/planAccusationWithBeliefs(): chooses top case-file candidates per category and combines confidences.
       - Player.prototype.isConfidentSolution / inferredAccusation: “certain accuse” helpers when only one candidate remains in each category.
     - What depends on it:
       - Sherlock AI’s behaviour, observer focus logging, and the observer casebook probability bars.
       - Any code that compares “most likely case-file” items relies on the category-normalised probabilities.
     - What breaks if changed:
       - Changing any of the weight locking, normalisation, or probability math will change AI behaviour and can destabilise beliefs.
       - Changing status/probability helper outputs will mislead logs and downstream decisions.
     ✅ Safe to edit: Comments/blank lines only (Phase 1).
     ⚠️ Dangerous to edit: Any executable logic, especially CASE_FILE_ID weight updates, normalisation, entropy math, and return shapes.
  */

  /* SUBSECTION: noteCardShown(card, ownerId) */
  /* Brief: “Hard evidence” update when an AI sees the exact shown card. */
  /* Detailed:
     - What it does: Marks the card seen, records its owner, then:
       - floors all owners,
       - floors CASE_FILE_ID (cannot be in solution if shown),
       - sets ownerId to ceil (locked),
       - normalises distribution.
     - What depends on it: Sherlock probability accuracy and correct observer casebook display.
     - What breaks if changed: Shown cards might remain possible for the case file, or ownership won’t lock correctly.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: The floor/ceil assignments and the clampAndNormalizeWeights call.
  */
  noteCardShown(card,ownerId){
    const key=this.cardKey(card.type,card.name);
    this.seen.add(key);
    this.knownOwners.set(key,ownerId);
    const w=this.ownerWeights.get(key);
    if(w){
      for(const [pid] of w) w.set(pid, AI_CFG.sherlock.weightFloor);
      w.set(CASE_FILE_ID, AI_CFG.sherlock.weightFloor); // ✅ cannot be in case file if shown by a player
      w.set(ownerId, AI_CFG.sherlock.weightCeil);
      this.clampAndNormalizeWeights(key);
    }

    /* SUBSECTION: Observer focus log (Sherlock only) */
    /* Brief: Emits a single line showing the locked owner and resulting probabilities. */
    /* Detailed:
       - What it does: Reads afterCase/afterOwn after locking and logs via gameRef.obs.
       - What depends on it: Observer deductions log readability.
       - What breaks if changed: Incorrect logging can misrepresent the belief state.
       ✅ Safe to edit: Comments only.
       ⚠️ Dangerous to edit: The gating conditions and probability reads.
    */
    if(this.gameRef?.observerMode && this.gameRef.aiDifficulty==='sherlock' && this.id===this.gameRef.observerFocusId){
      const ownerName = this.gameRef.players[ownerId]?.name ?? `P${ownerId}`;
      const who = this.gameRef.players[ownerId]?.name ?? `P${ownerId}`;
      const afterCase = this._pCaseNorm(card);
      const afterOwn  = this._pOwner(card, ownerId);
      this.gameRef.obs(`🧠 Saw exact card: ${who} showed ${card.type}:${card.name} → P(case-file)=${this._pct(afterCase)}; P(${who})=${this._pct(afterOwn)} (locked owner).`, { byPlayerId: this.id });
    }
  }

  /* SUBSECTION: noteCaseFileCard(card) */
  /* Brief: Forces a card into the “case file” owner bucket (solution lock). */
  /* Detailed:
     - What it does: Floors all owners, sets CASE_FILE_ID to ceil, then normalises.
     - What depends on it: No-refute / mild inference paths that conclude “this must be in the solution”.
     - What breaks if changed: Solution locks won’t reflect as near-certain in the belief model.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: CASE_FILE_ID assignment and normalisation.
  */
  // Sherlock beliefs: lock a specific card into the case file with near-certainty
  noteCaseFileCard(card){
    const key = this.cardKey(card.type,card.name);
    const w = this.ownerWeights.get(key);
    if(!w) return;

    // Set all owners (players) to floor, and case-file to ceil
    for(const [pid] of w) w.set(pid, AI_CFG.sherlock.weightFloor);
    w.set(CASE_FILE_ID, AI_CFG.sherlock.weightCeil);
    this.clampAndNormalizeWeights(key);

    if(this.gameRef?.observerMode && this.gameRef.aiDifficulty==='sherlock' && this.id===this.gameRef.observerFocusId){
      this.gameRef.obs(`🧠 CASE FILE LOCK: ${key} is placed in the case file (belief≈1.00).`, { byPlayerId: this.id });
    }
  }

  /* SECTION: Category-normalised case-file probability */
  /* Brief: Produces a per-category probability where remaining candidates sum to 1 within Suspects/Weapons/Rooms. */
  /* Detailed:
     - What it does:
       - Returns 0 if the card is already cleared.
       - If only one remaining candidate exists in that category, returns 1 for it.
       - Otherwise, sums raw P(case-file) over remaining, then returns this item’s share.
       - If the sum collapses near zero, falls back to uniform probability over remaining.
     - What depends on it: Observer casebook percentage bars and Sherlock accusation planning.
     - What breaks if changed: Percentages become misleading; confidence computations drift.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Remaining filtering, near-zero fallback threshold, and return formula.
  */
  // --- Sherlock: category-normalised probability that an item is in the case file ---
  // Ensures probabilities within each category (Suspect/Weapon/Room) sum to 1
  // across remaining (not cleared) candidates.
  caseFileProbNormalized(type, name){
    // If already cleared/eliminated/owned/seen, it cannot be in the case file
    if(this.isCleared(type, name)) return 0;

    const list = (type==='Suspect'?SUSPECTS : type==='Weapon'?WEAPONS : ROOMS);

    // Remaining candidates in this category (not cleared)
    const remaining = list.filter(n => !this.isCleared(type, n));

    // If only one remains, it must be the case-file item for this category
    if(remaining.length === 1){
      return (remaining[0] === name) ? 1 : 0;
    }

    // Sum raw P(case file) over remaining candidates
    let sum = 0;
    for(const n of remaining){
      const key = this.cardKey(type, n);
      const w = this.ownerWeights.get(key);
      const pCase = w ? (w.get(CASE_FILE_ID) ?? 0) : 0;
      sum += pCase;
    }

    // If everything collapsed near zero, fall back to uniform over remaining
    if(sum <= 1e-9){
      return 1 / remaining.length;
    }

    // Normalised value for this item
    const key = this.cardKey(type, name);
    const w = this.ownerWeights.get(key);
    const pCase = w ? (w.get(CASE_FILE_ID) ?? 0) : 0;

    return pCase / sum;
  }

  /* SECTION: Probability helper accessors */
  /* Brief: Small utilities for formatting and retrieving case-file/owner probabilities. */
  /* Detailed:
     - _pct: clamps to [0..1] and formats as an integer percent string.
     - _pCaseNorm: calls caseFileProbNormalized for a card object.
     - _pOwner: retrieves current probability/weight for a specific ownerId for a card.
     - What depends on it: Observer logs and debugging output.
     - What breaks if changed: Logs become misleading; downstream code expecting numbers may misbehave.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Return types, clamp behaviour, Map access.
  */
  _pct(x){ return `${Math.round(Math.max(0, Math.min(1, x)) * 100)}%`; }

  _pCaseNorm(card){
    return this.caseFileProbNormalized(card.type, card.name);
  }

  _pOwner(card, ownerId){
    const key = this.cardKey(card.type, card.name);
    const w = this.ownerWeights.get(key);
    return w ? (w.get(ownerId) ?? 0) : 0;
  }

  /* SECTION: entropyForCardKey(key) */
  /* Brief: Computes an information score (entropy) over the owner distribution for a card. */
  /* Detailed:
     - What it does: Treats weights as probabilities and computes Shannon entropy.
     - What depends on it: pickSmartSuggestionParts uses entropy to select informative suggestion components.
     - What breaks if changed: Suggestion selection quality shifts and can become biased or noisy.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: The math and zero-handling.
  */
  // Entropy of ownership distribution for a card (higher => more uncertain/informative)
  entropyForCardKey(key){
    const w=this.ownerWeights.get(key); if(!w) return 0;
    const vals = Array.from(w.values());
    const sum = vals.reduce((a,b)=>a+b,0)||1;
    const probs = vals.map(v=>v/sum);
    return -probs.reduce((acc,p)=>acc + (p>0 ? p*Math.log(p) : 0), 0);
  }

  /* SECTION: pickSmartSuggestionParts() */
  /* Brief: Chooses suspect and weapon that are likely to yield the most information, plus small randomness for human-like variety. */
  /* Detailed:
     - What it does: Scores candidates by entropy plus jitter; sometimes picks a “second best” to avoid robotic determinism.
     - What depends on it: Sherlock AI suggestion selection in aiTurn().
     - What breaks if changed: AI behaviour/difficulty changes; removing randomness makes play predictable.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Scoring formula, candidate pool selection, and randomness gates.
  */
  // Sherlock++: pick suspect & weapon that look most informative (entropy + tiny jitter)
  pickSmartSuggestionParts(){
    const pickFrom=(type)=>{
      const pool=this.possibleSet(type);
      const candidates=pool.length ? pool : (type==='Suspect'?SUSPECTS : type==='Weapon'?WEAPONS : ROOMS);
      let best=[],bestScore=-Infinity;
      for(const name of candidates){
        if(this.isCleared(type,name)) continue;
        const key=this.cardKey(type,name);
        const jitter=(Math.random()-0.5)*AI_CFG.sherlock.explorationEpsilon + this.randomJitter;
        const score=this.entropyForCardKey(key)+jitter;
        if(score>bestScore){best=[name];bestScore=score;}
        else if(score===bestScore){best.push(name);}
      }
      const pick = best.length ? choice(best) : choice(candidates);
      // sometimes pick second-best to look human
      if(Math.random()<AI_CFG.sherlock.pickSecondBestChance){
        const alt = candidates.filter(n => n!==pick);
        if(alt.length) return choice(alt);
      }
      return pick;
    };
    return {
      suspect: pickFrom('Suspect'),
      weapon : pickFrom('Weapon')
    };
  }

  /* SECTION: beliefsTopFor(type) */
  /* Brief: Finds the most likely case-file candidate in a category using category-normalised probabilities. */
  /* Detailed:
     - What it does: Scans uncleared items, tracks best and second-best probabilities, then computes a confidence blending best value and margin.
     - What depends on it: planAccusationWithBeliefs() and early-accuse logic elsewhere.
     - What breaks if changed: Confidence estimates change and can skew accusation timing.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Comparison logic, confidence formula, and return shape.
  */
  // Sherlock: pick the most likely case-file item in a category using category-normalised probabilities
  beliefsTopFor(type){
    const list = (type==='Suspect'?SUSPECTS : type==='Weapon'?WEAPONS : ROOMS);

    let bestName=null, bestVal=-1, second=-1;

    for(const name of list){
      if(this.isCleared(type, name)) continue;

      const p = this.caseFileProbNormalized(type, name);

      if(p > bestVal){ second = bestVal; bestVal = p; bestName = name; }
      else if(p > second){ second = p; }
    }

    const margin = Math.max(0.0001, bestVal - Math.max(0, second));
    const confidence = Math.max(0, Math.min(1, (bestVal * 0.75) + (margin * 0.25)));

    return { name: bestName, confidence };
  }

  /* SECTION: planAccusationWithBeliefs() */
  /* Brief: Produces a belief-based accusation plan with a combined confidence score. */
  /* Detailed:
     - What it does: Takes top candidate per category and combines confidences via geometric mean.
     - What depends on it: Sherlock early-accuse logic elsewhere.
     - What breaks if changed: Accusations may happen earlier/later or target different triples.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Combination math and return shape.
  */
  planAccusationWithBeliefs(){
    const s=this.beliefsTopFor('Suspect');
    const w=this.beliefsTopFor('Weapon');
    const r=this.beliefsTopFor('Room');
    const combined = Math.pow(s.confidence * w.confidence * r.confidence, 1/3);
    return { acc: { suspect:s.name, weapon:w.name, room:r.name }, confidence: combined };
  }
}

  /* SECTION: Prototype helpers for “certain” accusation path */
  /* Brief: When only one candidate remains in each category, the AI can accuse with certainty. */
  /* Detailed:
     - What it does:
       - isConfidentSolution(): checks remaining candidates count equals 1 for each category.
       - inferredAccusation(): returns the single remaining candidate in each category as an accusation object.
     - What depends on it: AI accusation logic uses these to trigger certain accusations.
     - What breaks if changed: AI may never accuse when it should, or accuse incorrectly.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: The category names and the array indexing.
  */
Player.prototype.isConfidentSolution = function(){
  return this.possibleSet('Suspect').length === 1
      && this.possibleSet('Weapon').length  === 1
      && this.possibleSet('Room').length    === 1;
};
Player.prototype.inferredAccusation = function(){
  return {
    suspect: this.possibleSet('Suspect')[0],
    weapon : this.possibleSet('Weapon')[0],
    room   : this.possibleSet('Room')[0]
  };
};

class Game{

  /* Detailed:

  }

  restoreTrial(){
    if(!this.trial) return;
    const { acc, prev } = this.trial;

    // Put pieces back where they were
    if(prev && prev.sus) this.suspectLoc.set(acc.suspect, prev.sus);
    if(prev && prev.wep) this.weaponLoc.set(acc.weapon,  prev.wep);

    // Clear centre trial state
    this.trial = null;
  }

  checkAccusation(a){
    return a.suspect===this.solution.suspect &&
           a.weapon===this.solution.weapon &&
           a.room===this.solution.room;
  }

/* SECTION: accuse(pl,acc) — accusation flow + verdict resolution
   Brief: Handles an accusation by showing the centre trial state, prompting, then applying CONVICTED (win) or NOT GUILTY (elimination) outcomes.
   Detailed:
     - What it does:
       - Logs the accusation, starts the centre "trial" display via beginTrial(pl, acc), and re-renders the board.
       - Shows an Accusation info prompt (awaited) before computing the verdict.
       - Checks the accusation via checkAccusation(acc) and branches:
         - If correct: sets gameOver + convicted, clears trial state, re-renders, shows Game Over, offers Play Again.
         - If wrong: sets pl.eliminated, switches centre tile to NOT GUILTY, and either restores immediately (human) or returns a flag for aiTurn() to restore after summary (AI).
     - What depends on it:
       - beginTrial()/restoreTrial()/checkAccusation() and renderBoard() centre-tile states (accused/notguilty/convicted).
       - aiTurn() relies on the return shape { correct:false, revertAfterSummary:true } for AI cleanup timing.
       - showInfoPrompt()/promptPlayAgain()/startNewGame() for UI flow.
     - What breaks if changed:
       - Changing trial stage strings or convicted object fields can desync centre-tile rendering.
       - Changing return object shapes/flags can break AI post-summary restore behaviour.
       - Reordering beginTrial/renderAll or removing awaits can alter pacing/state visibility.
   ✅ Safe to edit: Comments only.
   ⚠️ Dangerous to edit: Any executable logic, especially trial state mutations, awaits, and return shapes.
*/
async accuse(pl,acc){
    // 1) Move pieces to centre + show "ACCUSED" prompt first (tension)
    log(`${pl.name} ACCUSES: ${displaySuspect(acc.suspect)} in the ${acc.room} with the ${acc.weapon}!`);

    // Start the centre "trial" display (orange ACCUSED)
    this.beginTrial(pl, acc);
    renderAll(this);

    // Prompt describing the accusation (AI: this appears before end-of-turn summary)
    await showInfoPrompt('Accusation',
      `<div><b>${pl.name}</b> makes an accusation:</div>
       <div style="margin-top:10px;font-size:16px;">
         <b>${displaySuspect(acc.suspect)}</b> in the <b>${acc.room}</b> with the <b>${acc.weapon}</b>
       </div>
       <div style="margin-top:10px;color:var(--muted);font-size:12px;">Click OK to reveal the verdict…</div>`
    );

    if(this.observerMode){
      this.obs(`⚖️ ${pl.name} ACCUSES: ${displaySuspect(acc.suspect)} / ${acc.weapon} / ${acc.room}`);
    }

    // 2) Determine verdict
    const ok = this.checkAccusation(acc);

    if(ok){
      // === CORRECT: CONVICTED (keep tokens in centre, including ROOM token) ===
      this.gameOver=true;
      this.convicted={suspect:acc.suspect,weapon:acc.weapon,room:acc.room,winner:pl.name};

      // Keep suspect + weapon in centre (already there); clear trial state (we'll use convicted UI)
      this.trial = null;

      renderAll(this);

      if(this.observerMode){
        this.obs(`👮‍♂️ CONVICTED: ${pl.name} wins.`);
      }

      await showInfoPrompt('Game Over',
        `<div><b>${pl.name}</b> wins!</div>
         <div style="margin-top:10px;">Solution was: <b>${displaySuspect(this.solution.suspect)}</b> in the <b>${this.solution.room}</b> with the <b>${this.solution.weapon}</b>.</div>`
      );

      const again=await promptPlayAgain();
      if(again){ await startNewGame(game,{skipConfirm:true}); }
      return { correct:true };
    }

    // === WRONG: NOT GUILTY (keep tokens in centre temporarily, then revert) ===
    log(`❌ Wrong accusation. ${pl.name} is eliminated from taking turns (but can still refute).`);
    pl.eliminated=true;

    // Switch centre tile to NOT GUILTY (pale yellow), keep tokens there for the prompt/summary
    if(this.trial) this.trial.stage = 'notguilty';
    renderAll(this);

    if(this.observerMode){
      this.obs(`🕊 NOT GUILTY: ${pl.name} eliminated from taking turns.`);
    }

    if(pl.isHuman){
      // Human: use the existing Wrong Accusation prompt (plus the revert behaviour after OK)
      await showInfoPrompt('Wrong Accusation',
        `<div>That accusation was <b>incorrect</b>.</div>
         <div style="margin-top:10px;">Verdict: <b>🕊 NOT GUILTY</b>.</div>
         <div style="margin-top:10px;">You are eliminated from taking turns, but you will still be asked to refute suggestions.</div>
         <div style="margin-top:10px;color:var(--muted);font-size:12px;">Click OK to continue. The pieces will return to their previous positions.</div>`
      );

      // After dismissing the prompt: revert centre + pieces
      this.restoreTrial();
      renderAll(this);
      return { correct:false };
    }

    // AI: do NOT show another prompt here.
    // The NOT GUILTY display should remain visible during the end-of-turn summary,
    // and we will restore after the summary is dismissed (handled in aiTurn()).
    return { correct:false, revertAfterSummary:true };
  }

/* SECTION: Human Turn Loop + Prompt Flow (beginTurn → endTurn)
   Brief: Coordinates the active player’s turn, routing to human prompts or AI turn logic, and advancing turns safely.
   Detailed:
     - What it does: Resets per-turn flags (dice/reachable/awaitingMove/awaitingDecision), updates UI, then executes human or AI turn paths.
     - What depends on it: beginTurn()/endTurn() are the main loop; prompts and movement handlers assume these flags are set correctly.
     - What breaks if changed: Turn order can desync, prompts can appear at the wrong time, and movement/suggestion phases can become unreachable.
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any logic/flags, turn routing, or awaited calls (affects gameplay timing and correctness).
*/
async beginTurn(){
    if(this.gameOver) return;
    const pl=this.currentPlayer();
    this.dice=null;this.reachable=new Set();
    this.awaitingMove=false;this.awaitingDecision=!!pl.arrivedByOpponentSuggestion;
    this.stayedInsteadOfRoll=false;
    this.updateTurnUI();

    if(pl.eliminated){ await this.endTurn(); return; }
    if(pl.isHuman){ this.humanTurnsStarted++; await this.showRollPromptForHuman(); }
    else { await this.aiTurn(pl); }
  }

  /* SUBSECTION: showRollPromptForHuman() — human decision prompt (roll/stay/accuse)
     Brief: Builds and shows the “Your Turn” prompt for humans, choosing available actions based on state.
     Detailed:
       - What it does: Computes which buttons to show, renders the prompt, then dispatches to roll/stay/accuse handlers.
       - What depends on it: awaitingDecision + humanTurnsStarted gating; downstream handlers humanAccuse/humanStayAndSuggest/humanRollAndMove.
       - What breaks if changed: Wrong options appear, cancel loops break, or the human can get stuck without a valid action.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: Action values ('roll'/'stay'/'accuse'), prompt flow, and handler calls.
  */
  async showRollPromptForHuman(){
    const pl=this.currentPlayer();
    if(!pl.isHuman||this.gameOver||pl.eliminated) return;
    const firstEver=(this.humanTurnsStarted===1);
    const movedHere=this.awaitingDecision;
    let actions=[];
    if(movedHere){
      actions=[{label:'Roll Dice',value:'roll'},{label:'Stay',value:'stay',className:'secondary'},{label:'Make Accusation',value:'accuse',className:'danger'}];
    }else if(firstEver){
      actions=[{label:'Roll Dice',value:'roll'}];
    }else{
      actions=[{label:'Roll Dice',value:'roll'},{label:'Make Accusation',value:'accuse',className:'danger'}];
    }
    const body=movedHere?`<div>You were moved to <b>${pl.location}</b> by an opponent's suggestion.</div><div style="margin-top:8px;color:var(--muted);font-size:12px;">Choose what to do this turn.</div>`
                        :`<div>It's your turn in <b>${pl.location}</b>.</div><div style="margin-top:8px;color:var(--muted);font-size:12px;">Roll the dice to move.</div>`;
    const pick=await renderPrompt({title:'Your Turn',bodyHTML:body,actions});
    clearGameplayPrompt();
    if(pick==='accuse'){ await this.humanAccuse({onCancel:()=>this.showRollPromptForHuman()}); return; }
    if(pick==='stay'){ await this.humanStayAndSuggest(); return; }
    if(pick==='roll'){ await this.humanRollAndMove(); return; }
  }

  /* SUBSECTION: humanRollAndMove() — roll dice, compute reachable rooms, enter move-await state
     Brief: Rolls the dice, computes reachable rooms, and sets awaitingMove so the board shows Move buttons.
     Detailed:
       - What it does: Clears “arrivedByOpponentSuggestion” decision state, sets dice/reachable, logs, updates UI, and sets the Dice Result prompt.
       - What depends on it: computeReachable()/diceReachable(), renderBoard() highlight logic (awaitingMove + reachable Set).
       - What breaks if changed: Movement highlighting fails, move clicks may be rejected, or dice results won’t drive reachable rooms.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: dice/reachable/awaitingMove flags and setPromptMessage content/sequence.
  */
  async humanRollAndMove(){
    const pl=this.currentPlayer();
    if(!pl.isHuman||this.gameOver||pl.eliminated) return;
    if(this.stayedInsteadOfRoll) return;
    if(this.awaitingDecision){ this.awaitingDecision=false; pl.arrivedByOpponentSuggestion=false; }
    this.dice=randInt(1,6);
    this.reachable=this.computeReachable(pl.location,this.dice);
    this.awaitingMove=true;
    log(`You rolled a ${this.dice}. Choose a reachable room to move.`);
    this.updateTurnUI();
    setPromptMessage('Dice Result',`<div>You rolled a <b>${this.dice}</b>.</div><div style="margin-top:8px;">Now click <b>Move</b> on a highlighted room.</div>`);
  }

  /* SUBSECTION: humanStayAndSuggest() — skip roll when moved by suggestion, then suggest
     Brief: Allows a human moved by an opponent’s suggestion to stay put (no roll) and go straight to suggesting.
     Detailed:
       - What it does: Validates awaitingDecision, flips flags, logs, updates UI, then opens the suggestion prompt.
       - What depends on it: awaitingDecision meaning “eligible to stay”; openSuggestionPromptAuto() for the next phase.
       - What breaks if changed: Humans may incorrectly stay/roll, or suggestion phase may never open.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: awaitingDecision/stayedInsteadOfRoll/arrivedByOpponentSuggestion state transitions.
  */
  async humanStayAndSuggest(){
    const pl=this.currentPlayer(); if(!pl.isHuman||this.gameOver||pl.eliminated) return;
    if(!this.awaitingDecision) return;
    this.awaitingDecision=false; this.stayedInsteadOfRoll=true; pl.arrivedByOpponentSuggestion=false;
    log(`You chose to stay in ${pl.location} (no roll).`);
    this.updateTurnUI();
    await this.openSuggestionPromptAuto();
  }

  /* SUBSECTION: humanMoveTo(room) — complete a move, update pawn location, then suggest
     Brief: Finalizes a human move to a reachable room and transitions into the suggestion prompt.
     Detailed:
       - What it does: Validates awaitingMove + reachability, updates player location (and pawn map), clears awaitingMove, logs, updates UI, then opens suggestion prompt.
       - What depends on it: reachable Set membership, suspectLoc map updates for board tokens.
       - What breaks if changed: Illegal moves may be allowed/blocked incorrectly; pawn location can desync from player location.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: reachability checks and Map updates.
  */
  async humanMoveTo(room){
    const pl=this.currentPlayer();
    if(!pl.isHuman||!this.awaitingMove) return;
    if(!this.reachable.has(room)) return;
    pl.location=room; if(pl.suspect) this.suspectLoc.set(pl.suspect,room);
    this.awaitingMove=false; pl.arrivedByOpponentSuggestion=false;
    log(`You moved to ${room}.`);
    this.updateTurnUI();
    await this.openSuggestionPromptAuto();
  }

  /* SUBSECTION: openSuggestionPromptAuto() — suggestion UI (room fixed, pick suspect/weapon)
     Brief: Renders the suggestion prompt for the current room and executes makeSuggestion() if confirmed.
     Detailed:
       - What it does: Builds <select> options, renders prompt, reads selections, then either makes a suggestion + post-result prompt or ends the turn.
       - What depends on it: IDs selSuspect/selWeapon, makeSuggestion() logic, showPostSuggestionPrompt() branching.
       - What breaks if changed: Wrong element IDs break selection reads; ending-turn logic can trigger prematurely or not at all.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: select IDs, option templates, and go/suspect/weapon gating.
  */
  async openSuggestionPromptAuto(){
    const pl=this.currentPlayer(); if(!pl.isHuman||pl.eliminated||this.gameOver) return;
    if(this.awaitingMove) return;
    const room=pl.location;
    const sus=SUSPECTS.map(s=>`<option value="${s}">${displaySuspect(s)}</option>`).join("");
    const wep=WEAPONS.map(w=>`<option value="${w}">${w}</option>`).join("");
    const html=`<div><b>Room:</b> ${room}</div>
      <div style="margin-top:10px;" class="row">
        <label>Suspect: <select id="selSuspect">${sus}</select></label>
        <label>Weapon: <select id="selWeapon">${wep}</select></label>
      </div>
      <div style="margin-top:10px;color:var(--muted);font-size:12px;">Pick a suspect and weapon to make a suggestion.</div>`;
    const go=await renderPrompt({title:'Make a Suggestion',bodyHTML:html,actions:[{label:'Suggest',value:true}]});
    const suspect=document.getElementById('selSuspect')?.value;
    const weapon=document.getElementById('selWeapon')?.value;
    clearGameplayPrompt();
    if(go&&suspect&&weapon){
      const result=await this.makeSuggestion(pl,suspect,weapon,room);
      await this.showPostSuggestionPrompt(result,{suspect,weapon,room});
    }else{
      await this.endTurn();
    }
  }

  /* SUBSECTION: showPostSuggestionPrompt(result,triple) — after-suggestion choice (end/accuse)
     Brief: After making a suggestion, lets the human either end the turn or proceed to an accusation.
     Detailed:
       - What it does: Builds a result-dependent message, renders prompt, then either calls humanAccuse() or endTurn().
       - What depends on it: result.refuted flag shape returned by makeSuggestion(); onCancel callback loops back here.
       - What breaks if changed: Humans may lose the chance to accuse or get stuck in prompt loops.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: action values ('end'/'accuse') and callback wiring.
  */
  async showPostSuggestionPrompt(result,triple){
    const pl=this.currentPlayer(); if(!pl.isHuman||this.gameOver) return;
    const title=result.refuted?'Suggestion Result':'No One Could Refute!';
    const body=result.refuted
      ?`<div>Your suggestion has been <b>refuted</b>.</div><div style="margin-top:8px;color:var(--muted);font-size:12px;">What would you like to do next?</div>`
      :`<div><b>No one</b> could refute your suggestion:</div>
        <div style="margin-top:8px;"><b>${displaySuspect(triple.suspect)}</b> in the <b>${triple.room}</b> with the <b>${triple.weapon}</b>.</div>
        <div style="margin-top:8px;color:var(--muted);font-size:12px;">What would you like to do next?</div>`;
    const pick=await renderPrompt({title,bodyHTML:body,actions:[
      {label:'End Turn',value:'end',className:'secondary'},
      {label:'Make Accusation',value:'accuse',className:'danger'}
    ]});
    clearGameplayPrompt();
    if(pick==='accuse'){ await this.humanAccuse({onCancel:()=>this.showPostSuggestionPrompt(result,triple)}); }
    else await this.endTurn();
  }

  /* SUBSECTION: humanAccuse({onCancel}={}) — accusation UI and dispatch to accuse()
     Brief: Renders accusation prompt (suspect/weapon/room), then calls accuse() if confirmed or returns to prior flow on cancel.
     Detailed:
       - What it does: Builds <select> lists, renders prompt, reads accSus/accWeap/accRoom, then either accuses or cancels back to the correct prompt.
       - What depends on it: IDs accSus/accWeap/accRoom, roomsOptionsHTML(), accuse() flow, and onCancel callback.
       - What breaks if changed: Wrong IDs break DOM reads; cancel handling can strand the player or skip required prompts.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: element IDs, go/acc gating, and the onCancel decision tree.
  */
  async humanAccuse({onCancel}={}){
    const pl=this.currentPlayer(); if(!pl.isHuman||pl.eliminated||this.gameOver) return;
    if(this.awaitingMove) return;
    const sus=SUSPECTS.map(s=>`<option value="${s}">${displaySuspect(s)}</option>`).join("");
    const wep=WEAPONS.map(w=>`<option value="${w}">${w}</option>`).join("");
    const rms=this.roomsOptionsHTML();
    const html=`<div style="color:var(--warn)"><b>Warning:</b> If you are wrong, you will be eliminated from taking turns.</div>
      <div style="margin-top:10px;" class="row">
        <label>Suspect: <select id="accSus">${sus}</select></label>
        <label>Weapon: <select id="accWeap">${wep}</select></label>
        <label>Room: <select id="accRoom">${rms}</select></label>
      </div>`;
    const go=await renderPrompt({title:'Make an Accusation',bodyHTML:html,actions:[
      {label:'Cancel',value:false,className:'secondary'},
      {label:'Accuse',value:true,className:'danger'}
    ]});
    const acc={suspect:document.getElementById('accSus')?.value,weapon:document.getElementById('accWeap')?.value,room:document.getElementById('accRoom')?.value};
    clearGameplayPrompt();
    if(go&&acc.suspect&&acc.weapon&&acc.room){
      await this.accuse(pl,acc);
      if(!this.gameOver) await this.endTurn();
    }else{
      if(this.gameOver) return;
      if(typeof onCancel==='function'){ await onCancel(); return; }
      if(this.awaitingMove){
        setPromptMessage('Choose a Room',`<div>Click <b>Move</b> on a highlighted room.</div>`);
      }else{
        await this.showRollPromptForHuman();
      }
    }
  }

  /* SUBSECTION: roomsOptionsHTML() — builds <option> list for rooms
     Brief: Returns the HTML <option> markup for the room dropdown used in the accusation prompt.
     Detailed:
       - What it does: Maps ROOMS to <option value="...">...</option> strings.
       - What depends on it: humanAccuse() expects exact values to match room names.
       - What breaks if changed: Room selection can mismatch ROOMS strings, breaking accusation comparisons.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: Option value strings and ROOMS mapping.
  */
  roomsOptionsHTML(){ return ROOMS.map(r => `<option value="${r}">${r}</option>`).join(""); }

  /* SUBSECTION: endTurn() — advance to next active player and begin their turn
     Brief: Moves turnIndex to the next non-eliminated player, updates UI, then calls beginTurn() again.
     Detailed:
       - What it does: Skips eliminated players via nextTurnIndex(), refreshes UI, and continues the main loop.
       - What depends on it: nextTurnIndex() correctness; beginTurn() as the loop entry.
       - What breaks if changed: Turn order can get stuck, eliminated players may take turns, or recursion can misbehave.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: turnIndex updates, awaited beginTurn(), and eliminated-player skipping.
  */
  async endTurn(){
    if(this.gameOver) return;
    this.turnIndex=this.nextTurnIndex(this.turnIndex);
    this.updateTurnUI();
    await this.beginTurn();
  }

/* SECTION: aiTurn(pl) — AI full turn automation (move, suggest, accuse, summary)
   Brief: Runs one complete AI turn with pacing delays, movement decisions, suggestion selection, optional accusation, and end-of-turn summary.
   Detailed:
     - What it does:
       - Uses session guards (sid + isActiveSession) to prevent stale async updates after New Game.
       - Decides whether to stay (if moved by suggestion) or roll/move; updates dice/reachable and renders.
       - Chooses suggestion cards (Sherlock: entropy-based; Smart/basic: random from remaining), then calls makeSuggestion().
       - Optionally accuses (certain solution, or Sherlock belief-based early/mistake), then shows a summary prompt.
       - If AI accused wrong, restores centre trial display after the summary (revertAfterSummary).
     - What depends on it:
       - sessionId/newSession() + isActiveSession() for async safety.
       - Movement tables (ROOM_DICE) via computeReachable(), and renderAll() for UI sync.
       - Sherlock belief helpers (entropy/pickSmartSuggestionParts/planAccusationWithBeliefs/decayBeliefs) and accuse() return shape.
     - What breaks if changed:
       - Altering session checks can cause “ghost turns” after reset.
       - Changing decision thresholds affects AI behaviour/difficulty.
       - Changing summary/revert flow can leave centre tile stuck in NOT GUILTY or skip restores.
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any executable logic, especially session checks, decision thresholds, and returned flags used later.
*/
async aiTurn(pl){
    const sid=this.sessionId;
    if(this.gameOver) return;

    const summary=[];
    log(`${pl.name}'s turn…`);
    if(this.observerMode) this.obs(`▶ ${pl.name} turn started.`);
    summary.push('Turn started.');
    await sleep(650);
    if(!this.isActiveSession(sid)) return;

    let choseStay=false;

    /* SUBSECTION: Stay vs Roll decision (arrivedByOpponentSuggestion)
       Brief: If the AI was moved by an opponent’s suggestion, it may stay (no roll) or roll normally.
       Detailed:
         - What it does: Uses cleared-room status + difficulty-specific probabilities to set choseStay, then clears arrivedByOpponentSuggestion.
         - What depends on it: Correct meaning of arrivedByOpponentSuggestion and isCleared/possibleSet('Room').
         - What breaks if changed: AI may stay/roll incorrectly, skewing pacing and room coverage.
       ✅ Safe to edit: Comments/blank lines only.
       ⚠️ Dangerous to edit: Probability thresholds and flag resets.
    */
    // Stay vs Roll decision (Sherlock a bit more intentional)
    if (pl.arrivedByOpponentSuggestion) {
      const roomCleared=pl.isCleared('Room',pl.location);
      const roomsLeft=pl.possibleSet('Room');
      if(roomCleared){
        choseStay=false;
      }else if(isSherlock(this.aiDifficulty)){
        const isKeyRoom=roomsLeft.includes(pl.location);
        choseStay=isKeyRoom?(Math.random()<0.72):(Math.random()<0.28);
      }else if(isAdvancedAI(this.aiDifficulty)){
        const isKeyRoom=roomsLeft.includes(pl.location);
        choseStay=isKeyRoom?(Math.random()<0.65):(Math.random()<0.35);
      }else{
        choseStay=(Math.random()<0.45);
      }
      summary.push(choseStay?`Chose to STAY in ${pl.location} (no roll).`:`Chose to ROLL (was eligible to stay).`);
      pl.arrivedByOpponentSuggestion=false;
      await sleep(450);
      if(!this.isActiveSession(sid)) return;
    }

    /* SUBSECTION: Roll + move selection (reachables → dest)
       Brief: Rolls dice, evaluates reachable rooms, and picks a destination (with Sherlock “second-best” flavour).
       Detailed:
         - What it does: Computes reachables, scores destinations by next-turn potential, moves pawn, logs, renders, and pauses.
         - What depends on it: computeReachable/ROOM_DICE integrity, suspectLoc updates, and renderAll() timing.
         - What breaks if changed: AI movement can become illegal/stuck or desync board tokens from player location.
       ✅ Safe to edit: Comments/blank lines only.
       ⚠️ Dangerous to edit: Destination scoring, fallback, and pawn/location updates.
    */
    if(!choseStay){
      // Roll and compute reachables
      this.dice = randInt(1,6);
      this.reachable = this.computeReachable(pl.location, this.dice);
      log(`${pl.name} rolled ${this.dice}.`);
      summary.push(`Rolled a ${this.dice}.`);
      await sleep(650);
      if(!this.isActiveSession(sid)) return;

      const reach=[...this.reachable];
      const possibleRooms=new Set(pl.possibleSet('Room'));
      const candidates=reach.filter(r=>possibleRooms.has(r));
      const nextTurnPotential=(fromRoom)=>{
        const seen=new Set();
        for(let d=1;d<=6;d++){
          const arr=(ROOM_DICE[fromRoom]&&ROOM_DICE[fromRoom][d])?ROOM_DICE[fromRoom][d]:[];
          for(const r of arr) if(possibleRooms.has(r)) seen.add(r);
        }
        return seen.size;
      };
      const pickBest=(arr)=>{
        if(!arr.length) return null;
        let best=[],bestScore=-1;
        for(const r of arr){
          const s=nextTurnPotential(r);
          if(s>bestScore){best=[r];bestScore=s;}
          else if(s===bestScore){best.push(r);}
        }
        return choice(best);
      };
      let dest=candidates.length?pickBest(candidates):pickBest(reach);
      // Sherlock “second-best” flavor: compute after base dest, before moving
      if(isSherlock(this.aiDifficulty)){
        if(Math.random()<0.12){
          const scored = reach.map(r=>({ r, s:(possibleRooms.has(r)?2:0)+Math.random()*0.5 }))
                              .sort((a,b)=>b.s-a.s);
          if(scored.length>1) dest=scored[1].r;
        }
      }
      // Defensive fallback
      if(!dest) dest=pl.location;
      const from=pl.location;
      pl.location=dest;
      if(pl.suspect) this.suspectLoc.set(pl.suspect, dest);
      log(`${pl.name} moved from ${from} to ${dest}.`);
      summary.push(`Moved from ${from} to ${dest}.`);
      renderAll(this);
      await sleep(650);
      if(!this.isActiveSession(sid)) return;
    } else {
      // Chose to stay
      this.dice=null; this.reachable=new Set();
      renderAll(this);
    }

    /* SUBSECTION: Suggestion selection (Sherlock entropy vs Smart/basic remaining)
       Brief: Chooses suspect/weapon for the suggestion; Sherlock uses information gain (entropy), others pick from uncleared.
       Detailed:
         - What it does: Computes candidate pools from possibleSet(); Sherlock ranks entropy and calls pickSmartSuggestionParts(); logs reasoning in observer mode.
         - What depends on it: entropyForCardKey(), pickSmartSuggestionParts(), and observerMode logging.
         - What breaks if changed: AI deduction strength/feel shifts; observer reasoning logs may become misleading.
       ✅ Safe to edit: Comments/blank lines only.
       ⚠️ Dangerous to edit: Candidate pools, ranking logic, and logging string keys.
    */
    // Sherlock++: suggestion target selection + thought process logging
    let suspect, weapon;
    const room = pl.location;
    if (isSherlock(this.aiDifficulty)) {
      // Compute top entropy candidates (informative picks)
      const rankEntropy = (type, list) => {
        const arr = list.map(n => ({
          n,
          e: pl.entropyForCardKey(pl.cardKey(type, n))
        }));
        arr.sort((a,b)=>b.e-a.e);
        return arr.slice(0,3);
      };
      const susPool = pl.possibleSet('Suspect');
      const wepPool = pl.possibleSet('Weapon');
      const susCands = susPool.length ? susPool : SUSPECTS;
      const wepCands = wepPool.length ? wepPool : WEAPONS;
      const topSus = rankEntropy('Suspect', susCands);
      const topWep = rankEntropy('Weapon',  wepCands);
      const pick = pl.pickSmartSuggestionParts();
      suspect = pick.suspect;
      weapon  = pick.weapon;
      if(this.observerMode){
        this.obs(`🧠 ${pl.name} suggestion reasoning (Sherlock): choose high-information cards (entropy). Top suspects: ${topSus.map(x=>`${x.n}(${x.e.toFixed(2)})`).join(', ')}; picked ${suspect}. Top weapons: ${topWep.map(x=>`${x.n}(${x.e.toFixed(2)})`).join(', ')}; picked ${weapon}. Room is current location (${room}).`);
      }
    } else {
      // Smart/basic: pick from remaining (uncleared) candidates
      const sC = pl.possibleSet('Suspect');
      const wC = pl.possibleSet('Weapon');
      const susCands = sC.length ? sC : SUSPECTS;
      const wepCands = wC.length ? wC : WEAPONS;
      suspect = choice(susCands);
      weapon  = choice(wepCands);
      if(this.observerMode && this.aiDifficulty==='smart'){
        this.obs(`🧠 ${pl.name} suggestion reasoning (Smart): choose from uncleared candidates → suspects remaining=${susCands.length}, weapons remaining=${wepCands.length}. Picked ${suspect} + ${weapon}. Room is current location (${room}).`);
      }
    }

    summary.push(`Suggested: ${displaySuspect(suspect)} in the ${room} with the ${weapon}.`);
    const result=await this.makeSuggestion(pl,suspect,weapon,room);
    if(!this.isActiveSession(sid)) return;
    summary.push(result.refuted?`Refuted by ${result.by?.isHuman ? 'You' : (result.by?.name ?? 'another player')}.`:'No one could refute the suggestion.');

    // Sherlock++: beliefs decay each AI turn
    if (isSherlock(this.aiDifficulty)) pl.decayBeliefs();

    /* SUBSECTION: Accusation logic (certain vs Sherlock early/mistake)
       Brief: Decides whether to accuse: always when certain, sometimes early in Sherlock mode based on belief confidence.
       Detailed:
         - What it does: Checks isConfidentSolution(); else for Sherlock uses planAccusationWithBeliefs() + thresholds/evidence + randomness.
         - What depends on it: Player belief methods, AI_CFG.sherlock tuning, and accuse() side effects/return shape.
         - What breaks if changed: AI may accuse too early/late, or never accuse; wrong revertAfterSummary handling can stick centre display.
       ✅ Safe to edit: Comments/blank lines only.
       ⚠️ Dangerous to edit: Thresholds, randomness, and accOutcome handling.
    */
    // === Accusation logic ===
    let accused=false;
    let accOutcome=null; // used to revert NOT GUILTY display after summary (AI only)

    // A) Certain accusation (all difficulties)
    if(!pl.eliminated && pl.isConfidentSolution()){
      await sleep(650);
      if(!this.isActiveSession(sid)) return;
      const acc=pl.inferredAccusation();
      if(this.observerMode){
        this.obs(`🧠 ${pl.name} accusation reasoning: ONLY ONE candidate left in each category → suspect=${acc.suspect}, weapon=${acc.weapon}, room=${acc.room}. Accusing with certainty.`);
      }
      summary.push(`Accused (certain): ${displaySuspect(acc.suspect)} in the ${acc.room} with the ${acc.weapon}.`);
      accOutcome = await this.accuse(pl,acc);
      accused=true;
      if(accOutcome && accOutcome.correct===false){
        summary.push('Verdict: 🕊 NOT GUILTY (eliminated).');
      }
    }
    // B) Sherlock++: belief-aware early accusation (bold, sometimes wrong)
    else if(!pl.eliminated && isSherlock(this.aiDifficulty)){
      const plan = pl.planAccusationWithBeliefs();
      if(this.observerMode && plan){
        this.obs(`🧠 ${pl.name} accusation consideration (Sherlock): top guesses by category with confidence≈${plan.confidence.toFixed(2)} → suspect=${plan.acc.suspect}, weapon=${plan.acc.weapon}, room=${plan.acc.room}. Will accuse only if evidence+threshold met.`);
      }
      const hasEvidence = (pl.seen.size > pl.own.size) || pl.constraints.length > 0 || pl.unrefuted.length > 0;
      if (hasEvidence && plan && plan.confidence >= AI_CFG.sherlock.earlyAccuseMinConfidence) {
        if (Math.random() < AI_CFG.sherlock.earlyAccuseChance) {
          await sleep(650);
          if(!this.isActiveSession(sid)) return;
          summary.push(`Accused (early, conf=${plan.confidence.toFixed(2)}): ${displaySuspect(plan.acc.suspect)} in the ${plan.acc.room} with the ${plan.acc.weapon}.`);
          accOutcome = await this.accuse(pl, plan.acc);
          accused = true;
          if(accOutcome && accOutcome.correct===false){
            summary.push('Verdict: 🕊 NOT GUILTY (eliminated).');
          }
        }
      } else if (hasEvidence && Math.random() < AI_CFG.sherlock.mistakeRate) {
        // Rare outright mistake to feel human
        await sleep(650);
        if(!this.isActiveSession(sid)) return;
        const b = pl.planAccusationWithBeliefs();
        summary.push(`Accused (mistake): ${displaySuspect(b.acc.suspect)} in the ${b.acc.room} with the ${b.acc.weapon}.`);
        accOutcome = await this.accuse(pl, b.acc);
        accused = true;
        if(accOutcome && accOutcome.correct===false){
          summary.push('Verdict: 🕊 NOT GUILTY (eliminated).');
        }
      }
    }

    if (accused) {
      if (!this.isActiveSession(sid)) return;
      if (this.gameOver) return;
    }

    if(this.observerMode) this.obs(`■ ${pl.name} turn ended.`);
    summary.push('Turn ended.');
    await this.showOpponentTurnSummary(pl,summary);

    /* SUBSECTION: Post-summary trial restore (AI wrong accusation)
       Brief: Restores the centre-tile trial state AFTER the summary prompt if accuse() requested deferred restore.
       Detailed:
         - What it does: Checks accOutcome.revertAfterSummary then calls restoreTrial() and re-renders.
         - What depends on it: accuse() returning {revertAfterSummary:true} for AI wrong accusations.
         - What breaks if changed: Centre tile may remain in NOT GUILTY state or pieces may stay stuck in centre.
       ✅ Safe to edit: Comments/blank lines only.
       ⚠️ Dangerous to edit: Flag name/value and restoreTrial/renderAll order.
    */
    // If AI made a wrong accusation, revert the centre display AFTER the summary is dismissed
    if(accOutcome && accOutcome.revertAfterSummary){
      this.restoreTrial();
      renderAll(this);
    }

    if(!this.isActiveSession(sid)) return;
    await this.endTurn();
  }

/* SECTION: showOpponentTurnSummary(player,lines) — Opponent Turn Summary prompt
   Brief: Formats an AI turn’s “summary” array into a readable bullet list and shows it in an OK-only info prompt.
   Detailed:
     - What it does:
       - Turns `lines` into a single string where each entry is prefixed with "• " and separated by "\n".
       - Wraps that text in a styled HTML container that uses `white-space:pre-wrap` so newlines display properly.
       - Awaits showInfoPrompt(...) so the game pauses until the player clicks OK.
     - What depends on it:
       - aiTurn(pl) builds the `summary` array and calls this to present it before continuing to the next turn.
       - The newline join + `white-space:pre-wrap` are paired: together they produce the multi-line bullet list.
     - What breaks if changed:
       - If the join delimiter or `white-space` styling changes, the summary can collapse into a single unreadable line.
       - If the `await` is removed, turn flow timing changes (next turn may start before the summary is seen).
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any executable logic, especially the join '\n', the HTML string structure, and the awaited prompt call.
*/
async showOpponentTurnSummary(player,lines){
    const pretty=lines.map(l=>`• ${l}`).join('\n');
    const html=`<div style="margin-bottom:8px;"><b>${player.name}</b> finished their turn.</div>
      <div style="color:var(--muted);font-size:12px;margin-bottom:10px;">Click OK to continue.</div>
      <div style="background:rgba(0,0,0,0.18);border:1px solid var(--border);border-radius:12px;padding:10px;
                  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.35;white-space:pre-wrap;">${pretty}</div>`;
    await showInfoPrompt('Opponent Turn Summary',html);
  }
}

*/
