<!-- SECTION: Document Skeleton + Global Styles (Head + <style>) -->
<!-- Brief: Defines the HTML document metadata and the complete CSS theme/layout for the game UI. -->
<!-- Detailed: -->
<!-- - What it does: Sets charset/viewport/title, then establishes CSS variables (theme), layout grid, panels, tokens, board/room visuals, checklist UI, prompts, and responsive rules. -->
<!-- - What depends on it: ALL DOM elements/classes/IDs rendered later (Controls/Rooms/Casebook/Log/Board tokens) rely on these selectors for positioning, visibility, and appearance. -->
<!-- - What breaks if changed: Changing selectors/variables can make UI unreadable, misaligned, or hide interactive affordances (e.g., reachable/here outlines, token sizing, mobile stacking). -->
<!-- ✅ Safe to edit: Purely presentational values (colors, spacing) IF you keep selectors/variable names identical. -->
<!-- ⚠️ Dangerous to edit: Selector names, class structures, media-query logic, or anything that affects layout flow/visibility (can “break” playability even if logic is unchanged). -->

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🔍 ClueSolo — Human + AI</title>

<style>
  /* SECTION: Theme Tokens (CSS Variables) */
  /* Brief: Centralized design system for colors and key UI constants. */
  /* Detailed: */
  /* - What it does: Defines --bg/--panel/--text/etc. and per-suspect/per-weapon colors used by token styling. */
  /* - What depends on it: Nearly all rules below reference var(--...) for consistent theming. Tokens also use these for glow/border mixes. */
  /* - What breaks if changed: Renaming variables breaks all var() references -> fallback/invalid colors; changing suspect/weapon variables affects token color identity. */
  /* ✅ Safe to edit: Color values only (keep variable names exactly). */
  /* ⚠️ Dangerous to edit: Variable names or removing variables used elsewhere. */
  :root{
    --bg:#0f172a;
    --panel:#111c33;
    --text:#e5e7eb;
    --muted:#9ca3af;
    --accent:#60a5fa;
    --bad:#fb7185;
    --good:#34d399;
    --warn:#fbbf24;
    --border:rgba(255,255,255,0.12);

    /* Suspect colours */
    /* SUBSECTION: Suspect token color palette */
    /* - What it does: Provides distinct per-suspect colors referenced by .token.suspect.* rules later. */
    /* - What depends on it: The suspect token classnames (green/mustard/...) set --token-color from these. */
    /* - What breaks if changed: Incorrect/invalid values reduce readability; renaming variables breaks token styling. */
    /* ✅ Safe to edit: Hex values only. */
    /* ⚠️ Dangerous to edit: Variable names (must match later rules). */
    --sus-green:#2D9542;--sus-mustard:#D6AA28;--sus-peacock:#0085B7;--sus-plum:#9C51B6;--sus-scarlet:#ff2400;--sus-white:#f8fafc;
    /* Weapon colours */
    /* SUBSECTION: Weapon token color palette */
    /* - What it does: Provides distinct per-weapon colors referenced by .token.weapon.* rules later. */
    /* - What depends on it: Weapon token classnames (candlestick/dagger/...) set --token-color from these. */
    /* - What breaks if changed: Same risks as suspect palette (readability/identity). */
    /* ✅ Safe to edit: Hex values only. */
    /* ⚠️ Dangerous to edit: Variable names. */
    --wep-candle:#FFD700;--wep-dagger:#BB0A1E;--wep-lead:#B7C9E2;--wep-revolver:#D8D8D8;--wep-rope:#BAA38C;--wep-wrench:#879EBF;
  }

  /* SECTION: Base Page + Header Layout */
  /* Brief: Establishes global typography, background, and the top header bar styling. */
  /* Detailed: */
  /* - What it does: Sets body background gradient + default font; styles header spacing and subdued subtitle. */
  /* - What depends on it: The <header> element and overall look/feel. */
  /* - What breaks if changed: Major readability/contrast issues; shifting header sizing can affect sticky panel height calculations (later). */
  /* ✅ Safe to edit: Colors, fonts, padding (carefully). */
  /* ⚠️ Dangerous to edit: Removing body margin reset or critical background/contrast values. */
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(1200px 700px at 30% 0%, #1f2a4a, var(--bg));color:var(--text)}
  header{padding:14px 18px;display:flex;align-items:baseline;gap:12px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.15)}
  header h1{margin:0;font-size:18px}
  header .sub{color:var(--muted);font-size:13px}

  /* SECTION: Three-Column App Layout + Panel “Card” Styling */
  /* Brief: Defines the main grid (left controls, center board, right casebook) and shared panel visuals. */
  /* Detailed: */
  /* - What it does: .layout sets 3 columns; .panel provides consistent borders/gradients/shadows; headings and content padding. */
  /* - What depends on it: All major UI regions are panels inside .layout. */
  /* - What breaks if changed: Column sizes affect usability; removing overflow hidden can spill content; border radius/shadows are visual only. */
  /* ✅ Safe to edit: Background gradients/shadows/padding (visual). */
  /* ⚠️ Dangerous to edit: grid-template-columns (can make UI unusable), overflow/positioning that affects scroll/sticky behavior. */
  .layout{display:grid;grid-template-columns:360px 1fr 420px;gap:12px;padding:12px;align-items:start}
  .panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .panel h2{margin:0;padding:10px 12px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);color:#cbd5e1}
  .panel .content{padding:12px}
  .leftStack{display:grid;gap:12px;grid-template-rows:auto auto 1fr}
  .rightStack{display:grid;gap:12px;grid-template-rows:auto auto 1fr}

  /* SECTION: Generic Flex Rows + Pills (Status Badges) */
  /* Brief: Utility classes for horizontal alignment and badge-like indicators (turn/location/status). */
  /* Detailed: */
  /* - What it does: .row creates flex groups; .pill is the small rounded UI badge; .pill.* color variants show good/bad/warn states. */
  /* - What depends on it: Turn/Location pills, “active/eliminated” indicators, and general inline tags. */
  /* - What breaks if changed: Removing display:flex or wrapping can cause overlaps; changing pill sizes can affect header control layout. */
  /* ✅ Safe to edit: Colors, padding, font size (carefully). */
  /* ⚠️ Dangerous to edit: Class names or removing variants referenced by JS-rendered markup. */
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .row.between{justify-content:space-between}
  .pill{font-size:12px;padding:4px 8px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--muted)}
  .pill.good{color:var(--good);border-color:rgba(52,211,153,.4)}
  .pill.bad{color:var(--bad);border-color:rgba(251,113,133,.4)}
  .pill.warn{color:var(--warn);border-color:rgba(251,191,36,.4)}

  /* SECTION: Form Controls (Buttons + Selects) */
  /* Brief: Styles interactive controls used in prompts and panels. */
  /* Detailed: */
  /* - What it does: Gives consistent button/select appearance, hover/active feedback, and variant classes (.secondary/.danger/disabled). */
  /* - What depends on it: New Game button, prompt action buttons, dropdowns in setup/suggestion/accusation prompts. */
  /* - What breaks if changed: Removing :disabled styles affects affordance; changing cursor/hover is visual; changing class names breaks variant styling. */
  /* ✅ Safe to edit: Colors, border radius, padding (visual). */
  /* ⚠️ Dangerous to edit: Class names (.secondary/.danger) because JS assigns these by name in prompts. */
  button{cursor:pointer;border:1px solid var(--border);background:rgba(96,165,250,.18);color:var(--text);padding:8px 10px;border-radius:10px;font-weight:700;transition:transform .05s ease, background .2s ease}
  button:hover{background:rgba(96,165,250,.25)}button:active{transform:translateY(1px)}button.secondary{background:rgba(255,255,255,.06)}button.danger{background:rgba(251,113,133,.18)}button:disabled{opacity:.55;cursor:not-allowed}
  select{padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,.2);color:var(--text)}

  /* SECTION: Board Grid + Room Tiles */
  /* Brief: Defines the board as a CSS grid and each room tile’s base look/interaction states. */
  /* Detailed: */
  /* - What it does: .board creates a 12-column grid; .room styles each room panel; .reachable/.here outlines highlight move options and current position. */
  /* - What depends on it: JS renders board rooms into #board with .room classes; movement UI depends on visible reachability. */
  /* - What breaks if changed: Changing .board grid structure can misplace rooms; removing outline styles reduces usability (harder to see reachable). */
  /* ✅ Safe to edit: Colors, shadows, border radius (visual). */
  /* ⚠️ Dangerous to edit: Class names (.room, .reachable, .here, .center) because JS logic assigns these. */
  .board{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));grid-auto-rows:56px;gap:12px;padding:12px}
  .room.center{background:rgba(255,255,255,0.07);border-style:dashed}
  .room.center.convicted{border-style:solid;background:linear-gradient(180deg, rgba(52,211,153,.15), rgba(255,255,255,.04))}

  /* SECTION: Centre Tile “Trial” Visual States */
  /* Brief: Provides special styling for the center “Classified Files” tile during accusation flow. */
  /* Detailed: */
  /* - What it does: Adds .accused and .notguilty states for the center room tile (orange/yellow tension states). */
  /* - What depends on it: JS toggles these classes based on game.trial stage; improves readability of accusation events. */
  /* - What breaks if changed: Removing/renaming these classes means the visual state won’t match the game state, confusing players. */
  /* ✅ Safe to edit: Gradient colors only (visual). */
  /* ⚠️ Dangerous to edit: Class selectors (.room.center.accused/.notguilty/.convicted) because renderBoard() assigns them by name. */
  /* Accusation tension states for centre tile */
  .room.center.accused{
    border-style:solid;
    background:linear-gradient(180deg, rgba(251,191,36,.22), rgba(255,255,255,.04)); /* pale orange */
  }
  .room.center.notguilty{
    border-style:solid;
    background:linear-gradient(180deg, rgba(253,230,138,.22), rgba(255,255,255,.04)); /* pale yellow */
  }

  /* SECTION: Room Contents (Title, Tokens, Move Button) */
  /* Brief: Typography and flex layout for token “chips” inside each room, plus the per-room Move button positioning. */
  /* Detailed: */
  /* - What it does: .tokens wraps tokens; alignment rules prevent stretching; Move button is absolutely positioned top-right. */
  /* - What depends on it: Token chips for suspects/weapons/center holdings; move button appears on reachable rooms. */
  /* - What breaks if changed: Token alignment changes can cause cramped or overflowing rooms; moving the button can overlap titles/tokens. */
  /* ✅ Safe to edit: Minor spacing/padding (visual). */
  /* ⚠️ Dangerous to edit: Positioning rules that keep Move button usable and non-overlapping. */
  .room{border:1px solid var(--border);border-radius:12px;padding:10px;background:rgba(0,0,0,.15);min-height:96px;position:relative}
  .room .title{font-weight:900}.room .tokens{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .room .tokens{align-items:flex-start;align-content:flex-start;}
  .room .tokens .token{align-self:flex-start;}
  .room.reachable{outline:2px solid rgba(96,165,250,.55)}.room.here{outline:2px solid rgba(52,211,153,.55)}
  .room button{position:absolute;right:10px;top:10px;padding:6px 8px;border-radius:10px;font-size:12px}

  /* SECTION: Game Log Panel */
  /* Brief: Fixed-height scrollable monospace log for gameplay narration and error surfacing. */
  /* Detailed: */
  /* - What it does: Ensures #log area scrolls and preserves line breaks (pre-wrap). */
  /* - What depends on it: JS appends textContent logs; window.onerror also writes here. */
  /* - What breaks if changed: Removing overflow/white-space can hide logs or collapse formatting. */
  /* ✅ Safe to edit: Colors/border radius/font size (visual). */
  /* ⚠️ Dangerous to edit: white-space/overflow that preserves readability and scroll behavior. */
  .log{height:200px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.35;background:rgba(0,0,0,.18);border:1px solid var(--border);border-radius:12px;padding:10px;white-space:pre-wrap}

  /* SECTION: Sherlock “Observer Casebook” Probability UI */
  /* Brief: Styles the probability bar + percentage label shown for Sherlock difficulty in observer mode. */
  /* Detailed: */
  /* - What it does: probWrap/probBar/probPct create a slim progress bar with a small percentage label above it. */
  /* - What depends on it: renderObserverCasebook() inserts these elements when game.aiDifficulty==='sherlock'. */
  /* - What breaks if changed: Mis-sizing can overlap text; removing positioning breaks label placement. */
  /* ✅ Safe to edit: Colors, heights (carefully). */
  /* ⚠️ Dangerous to edit: Positioning/overflow rules that keep the bar contained and label readable. */
  .probWrap{
    position:relative;
    height:10px;
    border-radius:999px;
    border:1px solid var(--border);
    background:rgba(0,0,0,.18);
    overflow:hidden;
  }
  .probBar{
    height:100%;
    background:linear-gradient(90deg, rgba(96,165,250,.65), rgba(52,211,153,.55));
  }
  .probPct{
    position:absolute;
    top:-18px;
    right:0;
    font-size:10px;
    color:var(--muted);
  }
  
  /* SECTION: Centre Room Token Sizing Fix */
  /* Brief: Prevents the special “room token” in the center tile from appearing larger than other tokens. */
  /* Detailed: */
  /* - What it does: Tweaks line-height/padding for .room.center token variants to match other token chips. */
  /* - What depends on it: Center tile trial/convicted display includes a room token; this keeps layout stable. */
  /* - What breaks if changed: Center tile may expand or look inconsistent, pushing other UI around. */
  /* ✅ Safe to edit: Minor padding/line-height adjustments (visual). */
  /* ⚠️ Dangerous to edit: Selector specificity; avoid breaking other tokens. */
  /* Ensure centre room-token doesn't inflate compared to other tokens */
  .room.center .tokens .token.room{ line-height:1.1; padding:3px 7px; }

  /* SECTION: Manual Checklist Layout (with per-item notes) */
  /* Brief: Defines the 3-column checklist row: checkbox, label, and free-text note input. */
  /* Detailed: */
  /* - What it does: .noteitem is a grid; .noteText is the note input; .cleared applies strike-through. Includes mobile media query that stacks input below label. */
  /* - What depends on it: renderNotebook() and renderObserverCasebook() generate rows using these class names. */
  /* - What breaks if changed: Changing class names breaks styling; changing grid columns can misalign checkbox/label/input and harm usability. */
  /* ✅ Safe to edit: Spacing, font size, colors (visual) while preserving class names. */
  /* ⚠️ Dangerous to edit: The grid-template-columns / responsive override, because they control layout and overflow on small screens. */
  /* —— Checklist (with per-item single-line notes) —— */
  /* Wide / default: [checkbox] [label] [note input] on one line */
.noteitem{
  display:grid;
  grid-template-columns: auto auto 1fr; /* checkbox | name | input (flex) */
  column-gap:8px;
  align-items:center;         /* single-line alignment */
  padding:2px 0;
  color:var(--muted);
  font-size:12px;
}
.noteitem input[type="checkbox"]{
  grid-column:1;
  margin-top:0;
}
.noteitem .name{
  grid-column:2;
  color:var(--text);
  margin:0;
  white-space:nowrap;         /* keep the label from wrapping on wide screens */
}
.noteitem.cleared .name{
  text-decoration:line-through;
  color:#94a3b8;
}
.noteText{
  grid-column:3;              /* sits to the right of the label on wide screens */
  display:block;
  width:100%;
  box-sizing:border-box;
  margin:0;
  padding:3px 6px;
  border-radius:8px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.18);
  color:var(--text);
  font-size:12px;
  min-width:160px;            /* comfortable min size next to short labels */
}

/* SECTION: Checklist Responsive Rule (<= 540px) */
 /* Brief: Stacks the note input below the label to avoid cramped horizontal layouts on small screens. */
 /* Detailed: */
 /* - What it does: Changes .noteitem to 2 columns (checkbox + label) and makes .noteText span full width below. */
 /* - What depends on it: Mobile usability; without it, inputs can become too small or overflow. */
 /* - What breaks if changed: Checklist becomes hard to use on mobile; inputs may overflow off-screen. */
 /* ✅ Safe to edit: Minor margins/padding (visual). */
 /* ⚠️ Dangerous to edit: grid-column spans and the max-width breakpoint. */
/* Small screens: revert to stacked layout (input drops below the label) */
@media (max-width: 540px){
  .noteitem{
    grid-template-columns: auto 1fr;  /* checkbox | label on row 1 … */
    align-items:start;                /* let the input have its own row */
  }
  .noteitem .name{
    grid-column:2;
    white-space:normal;               /* allow wrapping on small screens */
  }
  .noteText{
    grid-column:1 / -1;               /* …and input spans full width on row 2 */
    margin-top:6px;
  }
}

  /* SECTION: Checklist Container */
  /* Brief: Vertical stack container for the three checklists (Suspects/Weapons/Rooms). */
  /* Detailed: */
  /* - What it does: Simple grid stack with spacing. */
  /* - What depends on it: Casebook panel layout. */
  /* - What breaks if changed: Mostly visual spacing; renaming class breaks styling. */
  /* ✅ Safe to edit: gap value (visual). */
  /* ⚠️ Dangerous to edit: Class name .checklistStack. */
  /* Container for each list (unchanged) */
.checklistStack{ display:grid; grid-template-columns:1fr; gap:10px }

  /* SECTION: Prompt (Modal-like) Box Styling */
  /* Brief: Styles the in-panel gameplay prompt UI (title/body/actions). */
  /* Detailed: */
  /* - What it does: Defines borders/background for promptBox and typography for title/body/actions; .placeholder used when idle. */
  /* - What depends on it: renderPrompt(), setPromptMessage(), clearGameplayPrompt(). */
  /* - What breaks if changed: Mostly UX/readability; renaming classes breaks prompt formatting. */
  /* ✅ Safe to edit: Colors, padding, font weights (visual). */
  /* ⚠️ Dangerous to edit: Class names used in JS when creating elements. */
  .promptBox{border:1px solid var(--border);border-radius:12px;background:rgba(0,0,0,.12);padding:10px}
  .promptTitle{font-weight:800;margin-bottom:6px;color:#e2e8f0}
  .promptBody{margin:6px 0 10px 0}
  .promptActions{display:flex;flex-wrap:wrap;gap:8px}
  .placeholder{color:var(--muted);font-size:12px}

  /* SECTION: Sticky Side Panels + Responsive Collapse */
  /* Brief: Keeps left/right panels sticky on wide screens; collapses to single-column layout on narrower screens. */
  /* Detailed: */
  /* - What it does: position:sticky with calculated height; media query at 1200px switches to static layout. */
  /* - What depends on it: Desktop usability (controls/log/casebook remain visible while board scrolls). */
  /* - What breaks if changed: Sticky panels might overlap/clip; wrong height calc can hide content or cause double scrollbars. */
  /* ✅ Safe to edit: Minor top/height offsets if you understand header sizing. */
  /* ⚠️ Dangerous to edit: position/height/overflow rules and breakpoint values (affect layout behavior). */
  .rightPanel,.leftPanel{position:sticky;top:12px;height:calc(100vh - 96px);overflow:auto}
  @media (max-width:1200px){.layout{grid-template-columns:1fr}.leftPanel,.rightPanel{position:static;height:auto;overflow:visible}}

  /* SECTION: Token “Chip” Styling (Suspects/Weapons/Rooms) */
  /* Brief: Visual styling for the token badges used on the board and in center tile. */
  /* Detailed: */
  /* - What it does: .token defines the pill shape; [data-color] enables color-mix glow using --token-color; .inactive uses dashed border; .dot provides a colored dot for some tokens. */
  /* - What depends on it: renderBoard() outputs <span class="token ..."> markup; some variants include .ico icons and/or .dot. */
  /* - What breaks if changed: Tokens may become unreadable, mis-sized, or lose identity. Changing selector names breaks styling of all pieces. */
  /* ✅ Safe to edit: Pure visual aspects (shadows, padding) while keeping selectors and CSS variables intact. */
  /* ⚠️ Dangerous to edit: Removing [data-color] styling or --token-color flow; altering class names used by JS (suspect/weapon + slug()). */
  .token{font-size:11px;padding:3px 7px;border-radius:999px;border:2px solid rgba(255,255,255,.18);background:#000;line-height:1.1;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:0 0 0 1px rgba(0,0,0,.35) inset}
  .token[data-color]{border-color: color-mix(in srgb, var(--token-color) 92%, transparent);color:color-mix(in srgb, var(--token-color) 92%, transparent);box-shadow:0 0 0 1px rgba(0,0,0,.35) inset,0 0 10px color-mix(in srgb, var(--token-color) 28%, transparent);text-shadow:0 1px 1px rgba(0,0,0,.85)}
  .token .dot{width:8px;height:8px;border-radius:999px;background: var(--token-color);box-shadow:0 0 0 1px rgba(0,0,0,.55), 0 0 10px color-mix(in srgb, var(--token-color) 35%, transparent)}
  .token.inactive{border-style:dashed}

  /* SUBSECTION: Token icon spacing */
  /* - What it does: Adds right margin to inline emoji icons inside tokens. */
  /* - What depends on it: Board token templates include <span class="ico">…</span>. */
  /* - What breaks if changed: Mostly visual alignment; removing may look cramped. */
  /* ✅ Safe to edit: margin values (visual). */
  /* ⚠️ Dangerous to edit: Changing class name .ico which is used in markup. */
.token .ico {
  margin-right: 6px;
}

  /* SUBSECTION: Token class -> color binding */
  /* - What it does: Maps token semantic classes to the CSS variables defined in :root. */
  /* - What depends on it: JS uses slug() to produce class suffixes; these must align (e.g., 'Lead Pipe' -> 'lead-pipe'). */
  /* - What breaks if changed: Color identity breaks; if slug/class mismatches, tokens lose color-mix behavior. */
  /* ✅ Safe to edit: Underlying variable values only (prefer editing in :root). */
  /* ⚠️ Dangerous to edit: The selector names (green/mustard/... / lead-pipe etc.) because they must match JS-generated class names. */
  .token.suspect.green{--token-color:var(--sus-green)}.token.suspect.mustard{--token-color:var(--sus-mustard)}.token.suspect.peacock{--token-color:var(--sus-peacock)}.token.suspect.plum{--token-color:var(--sus-plum)}.token.suspect.scarlet{--token-color:var(--sus-scarlet)}.token.suspect.white{--token-color:var(--sus-white)}
  .token.weapon.candlestick{--token-color:var(--wep-candle)}.token.weapon.dagger{--token-color:var(--wep-dagger)}.token.weapon.lead-pipe{--token-color:var(--wep-lead)}.token.weapon.revolver{--token-color:var(--wep-revolver)}.token.weapon.rope{--token-color:var(--wep-rope)}.token.weapon.wrench{--token-color:var(--wep-wrench)}
.ico{ display:inline-block; margin-right:6px; line-height:1; }

  /* SECTION: Mobile Board Layout Override (<= 540px) */
  /* Brief: Converts the 12-column board into a single-column stacked list for small screens, overriding JS grid placement. */
  /* Detailed: */
  /* - What it does: Re-defines .board to 1 column and forces .room/.room.center to ignore inline grid positioning via !important. */
  /* - What depends on it: Mobile usability; without it, the 12-column grid becomes too small and unreadable. */
  /* - What breaks if changed: Rooms may overlap or render off-screen; without !important, JS inline placement wins and layout stays cramped. */
  /* ✅ Safe to edit: min-height/gap values (visual). */
  /* ⚠️ Dangerous to edit: The !important overrides and selectors (.board .room, .board .room.center) which are critical to defeat inline styles. */
/* --- Mobile stacked layout for Rooms --- */
@media (max-width: 540px){
  /* Turn the board into a simple stacked layout */
  .board{
    display:grid;
    gap:12px;
    grid-template-columns: 1fr;   /* single column on mobile */
    grid-auto-rows: auto;
  }

  /* Override the JS inline grid placement */
  .board .room{
    grid-column: auto !important;
    grid-row: auto !important;
    min-height: 120px;
  }

  /* Center “Classified Files / Convicted” tile should also stack */
  .board .room.center{
    grid-column: auto !important;
    grid-row: auto !important;
  }
}
</style>

<!-- SECTION: Body Shell + Main UI Layout (Header + 3 Panels) -->
<!-- Brief: Defines the visible HTML structure the game renders into (left controls, center board/prompts, right casebook). -->
<!-- Detailed: -->
<!-- - What it does: Creates the DOM nodes that JavaScript targets by ID/class to inject game state (turn/location, players, hand, board, log, prompts, checklist). -->
<!-- - What depends on it: Nearly all JS rendering functions rely on these exact IDs: turnPill, locPill, btnNewGame, handBox, playersBox, log, board, gameplayPromptBox, noteSuspects/noteWeapons/noteRooms. -->

<script>
/* SECTION: Boot-Time Error Surfacing (window.onerror + unhandledrejection) */
/* Brief: Captures runtime errors/rejections and mirrors them into the in-app Game Log (#log) for visibility. */
/* Detailed:
   - What it does: Hooks global error handlers, formats a "[BOOT ERR]" line, appends to #log (and auto-scrolls) or falls back to console.error.
   - What depends on it: Debuggability and player-visible error reporting. The rest of the game can still run, but failures become harder to diagnose without this.
   - What breaks if changed: If #log lookup/append logic changes, errors may disappear or spam console only; if handler throws, you can lose the original error signal.
   ✅ Safe to edit: Comment text only; formatting of the explanatory comments.
   ⚠️ Dangerous to edit: Any code inside handlers (string formats, element IDs, scroll behavior), because it affects error reporting and could mask real issues.
*/
// --- Global error surface: log to the in-app Game Log panel ---
window.onerror = function (msg, url, line, col, err) {
  try {
    const box = document.getElementById('log');
    const where = (line != null && col != null) ? ` @ ${line}:${col}` : '';
    const text = `[BOOT ERR] ${msg}${where}\n`;
    if (box) {
      box.textContent += text;
      box.scrollTop = box.scrollHeight;
    } else {
      console.error(text);
    }
  } catch (e) {
    console.error('Error in window.onerror:', e);
  }
};

/* SUBSECTION: Unhandled Promise Rejection Surface */
/* Brief: Mirrors unhandled async failures into #log similarly to window.onerror. */
/* Detailed:
   - What it does: Listens for 'unhandledrejection', extracts a human-readable reason, and logs it to #log or console.
   - What depends on it: Visibility for async errors from await/Promise chains used throughout prompts and AI turns.
   - What breaks if changed: Losing reason extraction reduces usefulness; removing handler hides silent async failures.
   ✅ Safe to edit: Comment text only.
   ⚠️ Dangerous to edit: Logic that reads event.reason or writes to #log.
*/
// (Optional) also surface unhandled Promise rejections
window.addEventListener('unhandledrejection', (event) => {
  try {
    const box = document.getElementById('log');
    const reason = (event.reason && (event.reason.message || event.reason)) || 'Unhandled rejection';
    const text = `[BOOT ERR] Unhandled promise rejection: ${reason}\n`;
    if (box) {
      box.textContent += text;
      box.scrollTop = box.scrollHeight;
    } else {
      console.error(text);
    }
  } catch (e) {
    console.error('Error in unhandledrejection handler:', e);
  }
});


/* SECTION: Utility Helpers (Randomness, Timing, Parsing, Slugging) */
/* Brief: Small reusable helpers for randomness, delays, safe int parsing, and CSS-class-friendly slugs. */
/* Detailed:
   - What it does:
     - randInt: inclusive integer RNG used for dice rolls and other randomized choices.
     - choice: picks a random element from an array.
     - shuffle: in-place Fisher–Yates shuffle used for decks/room assignments.
     - sleep: Promise-based delay used to pace AI turns and UI timing.
     - clampInt: parses integer and clamps into a range with default fallback.
     - slug: converts display names into lowercase hyphenated tokens used in CSS class names.
   - What depends on it: Many core mechanics (dice, dealing, AI randomness, token class naming, async pacing).
   - What breaks if changed:
     - Any change to RNG or shuffle affects game behavior/determinism.
     - Changing slug changes class names, breaking token coloring selectors (e.g., lead-pipe).
     - Changing sleep/clampInt can break turn flow and input validation.
   ✅ Safe to edit: Comments/whitespace only.
   ⚠️ Dangerous to edit: Any function bodies, return shapes, or name/signature changes (widely referenced).
 */
/* Utilities */
const randInt=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;
const choice=arr=>arr[Math.floor(Math.random()*arr.length)];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const clampInt=(n,min,max,def)=>{const x=Number.parseInt(n,10); if(Number.isNaN(x)) return def; return Math.max(min,Math.min(max,x));};
const slug = s => String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');


/* SECTION: Core Data Tables (Suspects, Weapons, Rooms, Display Names, Icons) */
/* Brief: Declares the canonical lists of cards/rooms and display helpers used across UI + logic. */
/* Detailed:
   - What it does:
     - Defines the suspects/weapons/rooms arrays that drive dealing, suggestions, deduction, and rendering.
     - START_ROOMS maps initial suspect placements.
     - displaySuspect / displayCardName provide human-friendly labels.
     - ROOM_ICON maps room names to emojis for board/casebook visuals.
   - What depends on it: Deck building, UI options lists, token rendering, movement lookup keys, and any place names referenced by string.
   - What breaks if changed:
     - Changing strings (e.g., "Billiard Room") must match everywhere (movement tables, UI, logic); otherwise lookups fail.
     - Changing list order/contents affects starting placements and how players are assigned/represented.
     - Changing ROOM_ICON keys must match room names exactly or icons go missing.
   ✅ Safe to edit: Comments/whitespace only.
   ⚠️ Dangerous to edit: Any strings, array contents, object keys, or helper logic; these are “identity” constants used as lookup keys.
 */
/* Data */
const SUSPECTS=["Green","Mustard","Peacock","Plum","Scarlet","White"];
const SUSPECT_TITLES={Green:"Rev. Green",Mustard:"Col. Mustard",Peacock:"Mrs Peacock",Plum:"Prof. Plum",Scarlet:"Miss Scarlet",White:"Mrs White"};
const WEAPONS=["Candlestick","Dagger","Lead Pipe","Revolver","Rope","Wrench"];
const ROOMS=["Study","Hall","Lounge","Library","Billiard Room","Dining Room","Conservatory","Ballroom","Kitchen"];
const START_ROOMS=["Study","Lounge","Kitchen","Conservatory","Billiard Room","Hall"];

const displaySuspect=id=>SUSPECT_TITLES[id]||id;
const displayCardName=(type,name)=> type==='Suspect'?displaySuspect(name):name;

// Room icons for the board and casebook
const ROOM_ICON = {
  "Study": "📝",
  "Hall": "🧥",
  "Lounge": "🛋️",
  "Library": "📖",
  "Billiard Room": "🎱",
  "Dining Room": "🍽️",
  "Conservatory": "🪴",
  "Ballroom": "💃",
  "Kitchen": "🥩",
  "Classified Files": "🕵️‍♂️"
};


/* SECTION: Movement Map + Reachability (ROOM_DICE + diceReachable) */
/* Brief: Encodes “from room + dice roll -> reachable rooms” and exposes a helper to compute reachable destinations. */
/* Detailed:
   - What it does:
     - ROOM_DICE is a lookup: ROOM_DICE[currentRoom][dice] => array of rooms you can move to.
     - diceReachable clamps dice to 1..6 (via bitwise |0 then clamp) and returns a Set of reachable rooms for fast membership checks.
   - What depends on it:
     - Human movement highlighting (reachable rooms) and AI movement decisions both rely on diceReachable() results.
     - UI uses the Set to determine which rooms get the .reachable class and Move button.
   - What breaks if changed:
     - Any room name mismatch breaks lookups (empty reachables).
     - Changing the clamping logic changes how invalid dice values behave.
     - Changing return type (Set) breaks callers expecting Set.has().
   ✅ Safe to edit: Comments/whitespace only.
   ⚠️ Dangerous to edit: ROOM_DICE contents, room name strings, dice clamping, or return type.
 */
/* Movement (kept as in your current build, including passages on any dice) */
const ROOM_DICE={
  "Study":{1:["Kitchen","Hall"],2:["Kitchen","Hall","Library"],3:["Kitchen","Hall","Library","Lounge"],4:["Kitchen","Hall","Library","Lounge","Billiard Room"],5:["Kitchen","Hall","Library","Lounge","Billiard Room","Dining Room"],6:["Kitchen","Hall","Library","Lounge","Billiard Room","Dining Room","Conservatory"]},
  "Hall":{1:["Study"],2:["Study","Lounge"],3:["Study","Lounge","Library"],4:["Study","Lounge","Library","Dining Room"],5:["Study","Lounge","Library","Dining Room","Billiard Room"],6:["Study","Lounge","Library","Dining Room","Billiard Room","Kitchen"]},
  "Lounge":{1:["Conservatory","Dining Room"],2:["Conservatory","Dining Room","Hall"],3:["Conservatory","Dining Room","Hall","Kitchen"],4:["Conservatory","Dining Room","Hall","Kitchen","Study"],5:["Conservatory","Dining Room","Hall","Kitchen","Study","Ballroom"],6:["Conservatory","Dining Room","Hall","Kitchen","Study","Ballroom","Library"]},
  "Dining Room":{1:["Lounge"],2:["Lounge","Kitchen"],3:["Lounge","Kitchen","Hall"],4:["Lounge","Kitchen","Hall","Ballroom"],5:["Lounge","Kitchen","Hall","Ballroom","Study"],6:["Lounge","Kitchen","Hall","Ballroom","Study","Conservatory"]},
  "Kitchen":{1:["Study","Ballroom"],2:["Study","Ballroom","Dining Room"],3:["Study","Ballroom","Dining Room","Conservatory"],4:["Study","Ballroom","Dining Room","Conservatory","Lounge"],5:["Study","Ballroom","Dining Room","Conservatory","Lounge","Billiard Room"],6:["Study","Ballroom","Dining Room","Conservatory","Lounge","Billiard Room","Hall"]},
  "Ballroom":{1:["Kitchen"],2:["Kitchen","Conservatory"],3:["Kitchen","Conservatory","Dining Room"],4:["Kitchen","Conservatory","Dining Room","Billiard Room"],5:["Kitchen","Conservatory","Dining Room","Billiard Room","Lounge"],6:["Kitchen","Conservatory","Dining Room","Billiard Room","Lounge","Library"]},
  "Conservatory":{1:["Lounge","Billiard Room"],2:["Lounge","Billiard Room","Ballroom"],3:["Lounge","Billiard Room","Ballroom","Library"],4:["Lounge","Billiard Room","Ballroom","Library","Kitchen"],5:["Lounge","Billiard Room","Ballroom","Library","Kitchen","Study"],6:["Lounge","Billiard Room","Ballroom","Library","Kitchen","Study","Dining Room"]},
  "Billiard Room":{1:["Conservatory","Library"],2:["Conservatory","Library","Ballroom"],3:["Conservatory","Library","Ballroom","Study"],4:["Conservatory","Library","Ballroom","Study","Kitchen"],5:["Conservatory","Library","Ballroom","Study","Kitchen","Hall"],6:["Conservatory","Library","Ballroom","Study","Kitchen","Hall","Dining Room"]},
  "Library":{1:["Billiard Room"],2:["Billiard Room","Study"],3:["Billiard Room","Study","Conservatory"],4:["Billiard Room","Study","Conservatory","Hall"],5:["Billiard Room","Study","Conservatory","Hall","Ballroom"],6:["Billiard Room","Study","Conservatory","Hall","Ballroom","Lounge"]}
};
function diceReachable(room,dice){
  const d=Math.max(1,Math.min(6,dice|0));
  const t=ROOM_DICE[room];
  return new Set((t&&t[d])?t[d]:[]);
}


/* SECTION: DOM Convenience + In-App Logging (el + log) */
/* Brief: Small DOM helper and a timestamped logger that writes into #log. */
/* Detailed:
   - What it does:
     - el(id) wraps document.getElementById for concise code.
     - log(msg) prepends a timestamp and appends to the Game Log, auto-scrolling to the latest entry.
   - What depends on it: Almost all gameplay narration calls log(); many functions use el() for element lookup.
   - What breaks if changed: Changing the #log ID, timestamp formatting, or scroll behavior affects both usability and debugging; changing el() affects many call sites.
   ✅ Safe to edit: Comments only.
   ⚠️ Dangerous to edit: The ID 'log', textContent usage, or function names/signatures.
 */
/* DOM */
const el=id=>document.getElementById(id);
function log(msg){
  const box=el('log');
  const t=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  box.textContent+=`[${t}] ${msg}\n`;
  box.scrollTop=box.scrollHeight;
}


/* SECTION: Prompt System (renderPrompt + helpers) */
/* Brief: Centralized UI prompt renderer for in-panel interactions (setup, choices, info, play again). */
/* Detailed:
   - What it does:
     - renderPrompt({title, bodyHTML, actions}) builds a prompt inside #gameplayPromptBox and resolves a Promise when a button is clicked.
     - setPromptMessage shows a non-interactive message (title/body) with an empty actions row.
     - clearGameplayPrompt restores the placeholder message.
     - showInfoPrompt wraps renderPrompt with a single OK button.
     - showChoicePrompt builds a button list from choices, with optional Cancel.
     - promptPlayAgain shows a dedicated “Play Again?” prompt and returns a boolean.
   - What depends on it:
     - Nearly all human-facing interactions: setup, showing cards, suggestion/accusation confirmations, AI summary OK prompts.
     - The prompt box element ID 'gameplayPromptBox' and CSS classes 'promptTitle/promptBody/promptActions/placeholder'.
   - What breaks if changed:
     - Changing element IDs or class names breaks prompt layout/styling.
     - Altering resolve values changes game flow logic expecting true/null/etc.
     - Changing innerHTML usage changes how HTML strings are rendered in prompts.
   ✅ Safe to edit: Comments and whitespace only.
   ⚠️ Dangerous to edit: Any strings/IDs/class names, resolve logic, default labels, or DOM building order (used throughout gameplay).
 */
/* Prompt helpers */
function renderPrompt({title="",bodyHTML="",actions=[]}){
  return new Promise(resolve=>{
    const box=el('gameplayPromptBox');if(!box){resolve(null);return;}
    box.innerHTML="";
    const t=document.createElement('div');t.className='promptTitle';t.textContent=title;box.appendChild(t);
    const b=document.createElement('div');b.className='promptBody';b.innerHTML=bodyHTML;box.appendChild(b);
    const a=document.createElement('div');a.className='promptActions';
    actions.forEach(act=>{
      const btn=document.createElement('button');
      btn.textContent=act.label||'OK';
      if(act.className) btn.className=act.className;
      btn.onclick=()=>resolve(act.value!==undefined?act.value:true);
      a.appendChild(btn);
    });
    box.appendChild(a);
  });
}
function setPromptMessage(title, bodyHTML){
  const box=el('gameplayPromptBox');if(!box) return;
  box.innerHTML="";
  const t=document.createElement('div');t.className='promptTitle';t.textContent=title;box.appendChild(t);
  const b=document.createElement('div');b.className='promptBody';b.innerHTML=bodyHTML;box.appendChild(b);
  const a=document.createElement('div');a.className='promptActions';box.appendChild(a);
}
function clearGameplayPrompt(){
  const box=el('gameplayPromptBox');
  if(box) box.innerHTML='<div class="placeholder">Game-play prompts will appear here</div>';
}
async function showInfoPrompt(title,html){
  const r=await renderPrompt({title,bodyHTML:html,actions:[{label:'OK',value:true}]});
  clearGameplayPrompt();return r;
}
async function showChoicePrompt(title, promptHTML, choices, { allowCancel = true } = {}){
  const buttons=choices.map(ch=>({label:ch.label,value:ch.value,className:ch.className||'secondary'}));
  if(allowCancel) buttons.push({label:'Cancel',value:null,className:'secondary'});
  const r=await renderPrompt({title,bodyHTML:promptHTML,actions:buttons});
  clearGameplayPrompt();return r;
}
async function promptPlayAgain(){
  const r=await renderPrompt({
    title:'Play Again?',
    bodyHTML:`<div>Would you like to play again?</div><div style="margin-top:8px;color:var(--muted);font-size:12px;">Start a new game with fresh cards.</div>`,
    actions:[{label:'New Game',value:true,className:'danger'}]
  });
  clearGameplayPrompt();
  return !!r;
}


/* SECTION: Difficulty Labels + Difficulty Predicates */
/* Brief: Human-readable labels and helper predicates for branching AI logic by difficulty mode. */
/* Detailed:
   - What it does:
     - DIFF_LABELS maps internal difficulty keys to display strings.
     - normDiff maps legacy "deep" to "smart" (backwards compatibility).
     - isAdvancedAI checks for smart/sherlock/deep modes.
     - isSherlock checks for sherlock mode specifically.
   - What depends on it: Setup UI label display, AI inference/observer logging toggles, and any conditional branches keyed by difficulty.
   - What breaks if changed:
     - Renaming keys breaks saved/back-compat behavior (e.g., "deep").
     - Changing predicate logic alters which AI features activate for a given mode.
   ✅ Safe to edit: Comments only.
   ⚠️ Dangerous to edit: Keys/strings used by save/back-compat, and the boolean logic in helper predicates.
 */
// Difficulty helpers & labels
const DIFF_LABELS = {
  basic   : 'Basic inference',
  smart   : 'Smarter inference',
  sherlock: 'Sherlock (expert + human-like quirks)',
  // Back-compat alias if old saves or code still sets "deep":
  deep    : 'Smarter inference'
};
const normDiff = (d) => (d === 'deep' ? 'smart' : d); // map old "deep" to "smart"
const isAdvancedAI = (d) => (d === 'smart' || d === 'sherlock' || d === 'deep');
const isSherlock   = (d) => (d === 'sherlock');

/* SECTION: Setup Prompts (New Game Setup + Human Suspect Selection) */
/* Brief: Collects initial game parameters (difficulty/opponents/observer) and the human/focus suspect selection. */
/* Detailed:
   - What it does: Builds HTML prompt bodies, renders them via renderPrompt(), then reads selected values from the DOM to return structured setup info.
   - What depends on it: Startup flow and “New Game” flow call these to configure players, difficulty, and observer mode; IDs diffSel/oppCountSel/humanSusSel must match.
   - What breaks if changed: Changing prompt HTML IDs or return object shape breaks downstream setup (difficulty normalization, player count, observer-mode behavior).
   ✅ Safe to edit: Prompt copy/text inside the HTML strings (labels/help text) IF you do NOT change element IDs or option values.
   ⚠️ Dangerous to edit: Any IDs (diffSel, oppCountSel, humanSusSel), option values (basic/smart/sherlock/observer), or logic that maps/returns settings.
*/
/* Setup prompts */
async function promptGameSetup(){
  /* SUBSECTION: Prompt markup for difficulty + opponent count */
  /* Brief: Defines the interactive HTML (selects) injected into the gameplay prompt box. */
  /* Detailed:
     - What it does: Creates two <select> inputs whose values are read after renderPrompt resolves.
     - What depends on it: document.getElementById('diffSel') and ('oppCountSel') below.
     - What breaks if changed: If these IDs or option values change, the subsequent reads and mode selection fail.
     ✅ Safe to edit: Visible labels (“Choose game setup”, “Opponents”, etc.).
     ⚠️ Dangerous to edit: id="diffSel", id="oppCountSel", and option value strings.
  */
  const body = `
    <div style="margin-bottom:10px;">Choose game setup:</div>

/* SECTION: Sherlock++ Tuning Parameters (AI_CFG.sherlock) */

*/
/* --- Sherlock++ tuning --- */
const AI_CFG = {
  sherlock: {
    // Learning strengths
    weightBoostShow: 3.5,           // when a specific shown card is known
    weightBoostRefutePattern: 0.35, // when someone refutes a triple containing a card
    weightPenaltyNoRefute: 0.60,    // when someone fails to refute a triple
    decay: 0.985,                   // slow belief decay

    // Weight bounds
    weightFloor: 0.01,
    weightCeil:  4.00,

    // Decision-making & mistakes
    mistakeRate: 0.07,              // chance to make a plainly bad call
    earlyAccuseMinConfidence: 0.82, // confidence threshold to consider early accuse
    earlyAccuseChance: 0.25,        // chance to actually take the early accuse
    explorationEpsilon: 0.12,       // randomness in suggestion targets
    pickSecondBestChance: 0.10      // sometimes pick second-best to feel human
  }
};


/* SECTION: ALL_CARDS (Flattened Card List for Belief Initialization) */

   - What breaks if changed: Missing or altered entries cause beliefs to ignore cards or misclassify types; changing shapes breaks iterators expecting {type,name}.
   ✅ Safe to edit: Comments only.
   ⚠️ Dangerous to edit: The mapping logic, object keys (type/name), or the source arrays.
*/
// Flattened list of all cards (for belief initialization)
const ALL_CARDS = [
  ...SUSPECTS.map(n => ({type:'Suspect', name:n})),
  ...WEAPONS.map(n => ({type:'Weapon', name:n})),
  ...ROOMS.map(n => ({type:'Room', name:n}))

/* SECTION: Case File “Owner” Constants (CASE_FILE_ID / CASE_FILE_NAME) */
/* Brief: Represents the envelope/case file as a special pseudo-owner in Sherlock belief distributions. */
/* Detailed:
   - What it does: Uses CASE_FILE_ID (-1) as an additional owner key in probability maps; CASE_FILE_NAME is a display label.
   - What depends on it: Belief maps (ownerWeights) include CASE_FILE_ID; multiple methods reference CASE_FILE_ID to update case-file probability.
   - What breaks if changed: Changing CASE_FILE_ID breaks all Maps keyed by -1; case-file inference would stop working or collide with real player IDs.
   ✅ Safe to edit: Comments only.
   ⚠️ Dangerous to edit: The numeric ID (-1) and any references to it.
*/
// Case file / envelope is treated as an additional "owner" in Sherlock beliefs
const CASE_FILE_ID = -1;
const CASE_FILE_NAME = 'Case File';

/* SECTION: Game Model — Player (Constructor + Core Knowledge + Belief Initialisation) */
/* Brief: Defines the Player class and the early “knowledge + Sherlock beliefs” setup used right after dealing. */
/* Detailed:
   - What it does:
     - constructor(...): creates all per-player state containers (hand, knowledge Sets/Maps, Sherlock belief Maps, constraint lists).
     - cardKey(...): produces the canonical string key used everywhere to identify a card.
     - initKnowledge(): marks your own dealt hand as known/seen/owned immediately after dealing.
     - initBeliefs(players): (Sherlock++) builds per-card owner probability maps for all players + case file, then “locks” your own cards.
   - What depends on it:
     - Dealing/setup calls initKnowledge() and initBeliefs().
     - Inference and rendering depend on the existence and names of: seen, own, knownOwners, knowledgeMeta, ownerWeights, refutationCounts, notOwners, constraints, unrefuted, gameRef.
     - Any later deduction steps assume cardKey() format is stable.
   - What breaks if changed:
     - Changing property names breaks all downstream lookups (null/undefined errors, missing UI, broken inference).
     - Changing cardKey() formatting breaks all Maps/Sets keyed by card identity (knowledge “resets” and inference fails).
     - Changing initKnowledge/initBeliefs logic alters gameplay/difficulty and can corrupt Sherlock probabilities.
   ✅ Safe to edit: Comments/blank lines only (per Phase 1 rules).
   ⚠️ Dangerous to edit: Any executable code, any IDs/keys, method signatures, or the exact `${type}:${name}` cardKey format.
*/

/* Game Model */
class Player{
  /* SUBSECTION: constructor(id, isHuman=false, suspect=null) */
  /* Brief: Initializes identity, UI name, starting location, and all knowledge/belief containers. */
  /* Detailed:
     - What it does: Sets up baseline game state plus Sherlock++ data structures used later for probability tracking and inference.
     - What depends on it: Everything that reads player state each turn, and all inference code expecting these fields to exist.
     - What breaks if changed: Missing/renamed fields cause inference/rendering to throw or silently stop updating.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Any of the assignments, container types (Set/Map/Array), or defaults like location='Hall'.
  */
  constructor(id,isHuman=false,suspect=null){
    this.id=id;this.isHuman=isHuman;this.suspect=suspect;
    this.name=suspect?displaySuspect(suspect):(isHuman?'You':`AI-${id}`);
    this.hand=[];this.location='Hall';this.eliminated=false;
    this.seen=new Set();this.own=new Set();
    this.knownOwners=new Map(); // cardKey -&gt; playerId
    this.knowledgeMeta = new Map(); // cardKey -&gt; { status:'own'|'seen'|'deduced'|'eliminated', ownerId?:number }
    this.gameRef = null; // set by Game.resetPlayers so Player can log in Sherlock
    this.constraints=[];this.unrefuted=[];
    this.arrivedByOpponentSuggestion=false;

    // Sherlock++ state
    this.ownerWeights = new Map();     // cardKey -&gt; Map(playerId -&gt; weight/prob (normalized))
    this.refutationCounts = new Map(); // cardKey -&gt; Map(playerId -&gt; count)
    this.notOwners = new Map();        // cardKey -&gt; Set(playerId) known NOT to own
    this.playerCount = 0;
    this.randomJitter = Math.random() * 0.02;
  }

  /* SUBSECTION: cardKey(type, name) */
  /* Brief: Canonical identifier for a card used as a Map/Set key everywhere. */
  /* Detailed:
     - What it does: Combines type and name into a single stable string key.
     - What depends on it: knownOwners, knowledgeMeta, ownerWeights, refutationCounts, notOwners, constraints all use this key.
     - What breaks if changed: Any change makes all existing key-based lookups fail (knowledge and beliefs become inconsistent).
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: The returned template string format.
  */
  cardKey(type,name){return `${type}:${name}`;}

  /* SUBSECTION: initKnowledge() */
  /* Brief: Marks the player’s own hand as “owned and seen” immediately after dealing. */
  /* Detailed:
     - What it does: For each dealt card, records ownership and provenance metadata.
     - What depends on it: Deduction logic assumes your own cards are cleared; observer/provenance UI relies on knowledgeMeta status='own'.
     - What breaks if changed: AI/human knowledge diverges; cards you hold may be treated as unknown.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: The Set/Map writes and the knowledgeMeta object shape.
  */
  initKnowledge(){
  for(const c of this.hand){
    const k=this.cardKey(c.type,c.name);
    this.own.add(k);
    this.seen.add(k);
    this.knownOwners.set(k,this.id);
    this.knowledgeMeta.set(k, { status:'own', ownerId:this.id });
  }
}

  /* SUBSECTION: initBeliefs(players) — Sherlock++ belief init (called after dealing) */
  /* Brief: Initializes per-card owner weight maps across players + case file, then locks this player's own cards. */
  /* Detailed:
     - What it does:
       - Creates ownerWeights entries for every card in ALL_CARDS.
       - Seeds uniform weights across each player id plus CASE_FILE_ID.
       - Normalizes each distribution via clampAndNormalizeWeights().
       - For this player’s hand: sets all owners to floor, this.id to ceil, then renormalizes.
     - What depends on it: Sherlock difficulty probability model and later belief updates.
     - What breaks if changed: Case-file ownership modeling or normalization can become invalid, breaking Sherlock behaviour and probability UI.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Inclusion of CASE_FILE_ID, the normalization call, and the “lock own cards” loop.
  */
  // --- Sherlock++ belief init (called after dealing)
  initBeliefs(players){
    this.playerCount = players.length;
    // uniform weights initially
    for(const c of ALL_CARDS){
      const key=this.cardKey(c.type,c.name);
      const w=new Map();

      // All players start equally likely to own the card...
      for(const p of players) w.set(p.id, 1.0);

      // ...and the case file is also a possible "owner"
      w.set(CASE_FILE_ID, 1.0);

      this.ownerWeights.set(key, w);
      this.clampAndNormalizeWeights(key);
    }

    // I own my cards with certainty (others near-floor)
    for(const c of this.hand){
      const key=this.cardKey(c.type,c.name);
      const w = this.ownerWeights.get(key);
      if (!w) continue;
      for(const [pid] of w) w.set(pid, AI_CFG.sherlock.weightFloor);
      w.set(this.id, AI_CFG.sherlock.weightCeil);
      this.clampAndNormalizeWeights(key);
    }
  }

/* SECTION: Sherlock++ Weight Normalization (Single-Card Distribution) */
  /* Brief: Clamps and normalizes the owner-weights Map for one card key. */
  /* Detailed:
     - What it does:
       - Fetches the Map of owner weights for this card key.
       - Clamps each weight into [AI_CFG.sherlock.weightFloor, AI_CFG.sherlock.weightCeil].
       - Sums the clamped weights, then (if sum > 0) divides each by sum so the distribution totals 1.
     - What depends on it:
       - Any Sherlock belief update that tweaks weights relies on this to keep distributions bounded and comparable.
       - Probability UI (e.g., percent bars) and any “most likely owner/case-file” comparisons assume weights are normalized.
     - What breaks if changed:
       - Changing clamping bounds or removing clamping can let values explode/collapse and dominate the distribution.
       - Changing normalization (or skipping it) makes weights stop summing to 1, breaking probability interpretation and downstream logic.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: Any executable code, especially clamp bounds, sum logic, or the normalization loop.
  */
  clampAndNormalizeWeights(key){
    const w=this.ownerWeights.get(key); if(!w) return;
    let sum=0;
    for(const [pid,val] of w){
      const clamped=Math.max(AI_CFG.sherlock.weightFloor,Math.min(AI_CFG.sherlock.weightCeil,val));
      w.set(pid,clamped); sum+=clamped;
    }
    if(sum>0){for(const [pid,val] of w) w.set(pid,val/sum);}
  }

/* SECTION: Player inference + belief upkeep (SAFE PASTE VERSION) */
/* Brief: This block is core to Smart/Sherlock reasoning: belief decay, knowledge recording, negative knowledge, and constraint deduction. */
/* Detailed:
   - What it does: Updates belief weights (decay), records seen cards + provenance, tracks "not owner" facts, eliminates case-file candidates, and deduces owners from refute constraints.
   - What depends on it: AI turns, observer-mode deductions log, and anything that calls possibleSet/hasAnyOf/addRefuteConstraint/propagateConstraints.
   - What breaks if changed: Any logic/key/status change can stop inference, corrupt knowledge, or crash turn flow.
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any executable code, especially Map/Set updates, loop conditions, and status strings.
*/

/* NOTE (important): I am NOT outputting any HTML entities in executable code.
   If your editor/file ever contains things like &gt; or &amp;&amp; inside <script>, JS will stop and startup prompts will vanish.
   The code lines below use literal operators only (>, &&, =>, >=). */

  /* SUBSECTION: decayBeliefs() */
  /* Brief: Applies slow belief decay each turn, then normalises each card distribution. */
  /* Detailed:
     - What it does: Multiplies each owner weight by AI_CFG.sherlock.decay, then calls clampAndNormalizeWeights for each card key.
     - What depends on it: Sherlock AI "feel" and probability stability.
     - What breaks if changed: Beliefs can freeze or become too random; skipping normalisation corrupts distributions.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Any math or iteration structure.
  */
  decayBeliefs(){
    for(const [key,w] of this.ownerWeights){
      for(const [pid,val] of w) w.set(pid, val*AI_CFG.sherlock.decay);
      this.clampAndNormalizeWeights(key);
    }
  }

  /* SUBSECTION: markSeen(card, ownerId=null) */
  /* Brief: Records that a card is cleared/known, with provenance used by observer UI. */
  /* Detailed:
     - What it does: Adds card key to seen; optionally records knownOwners; sets knowledgeMeta to one of: own / seen / eliminated.
     - What depends on it: Observer Casebook status labels and constraint pruning later.
     - What breaks if changed: Wrong provenance or owner tracking leads to misleading UI and incorrect deductions.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: ownerId checks, status strings, and metadata object shape.
  */
  markSeen(card,ownerId=null){
    const k=this.cardKey(card.type,card.name);
    this.seen.add(k);
    if(ownerId!==null&&ownerId!==undefined) this.knownOwners.set(k,ownerId);

    // provenance
    if(this.own.has(k)){
      this.knowledgeMeta.set(k,{status:'own',ownerId:this.id});
    }else if(ownerId!==null && ownerId!==undefined){
      this.knowledgeMeta.set(k,{status:'seen',ownerId});
    }else{
      // seen but unknown owner => treat as eliminated (not in case file)
      this.knowledgeMeta.set(k,{status:'eliminated'});
    }  
  }

  /* SUBSECTION: markNotOwner(card, playerId) */
  /* Brief: Negative knowledge: records that a player cannot own a given card. */
  /* Detailed:
     - What it does: Stores playerId inside notOwners[cardKey] Set.
     - What depends on it: propagateConstraints prunes impossible keys using this.
     - What breaks if changed: Constraints won’t shrink correctly, weakening or breaking deductions.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Map/Set structure and keying.
  */
  // Negative knowledge: mark someone does NOT own a card
  markNotOwner(card, playerId){
    const key=this.cardKey(card.type,card.name);
    let set=this.notOwners.get(key);
    if(!set){set=new Set(); this.notOwners.set(key,set);}
    set.add(playerId);
  }

  /* SUBSECTION: markEliminated(type, name) */
  /* Brief: Marks a card as not in the case file (and updates Sherlock belief if available). */
  /* Detailed:
     - What it does: Adds key to seen; sets knowledgeMeta eliminated when owner unknown; floors CASE_FILE_ID weight then normalises.
     - What depends on it: Deduction correctness and Sherlock probability model.
     - What breaks if changed: Eliminated cards may still appear possible in the case file, skewing AI planning.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: CASE_FILE_ID update and normalisation call.
  */
  markEliminated(type,name){
    const key=this.cardKey(type,name);
    if(this.own.has(key)) return; // never eliminate own card
    this.seen.add(key);
    if(!this.knownOwners.has(key)){
      this.knowledgeMeta.set(key,{status:'eliminated'});
    }

    // Sherlock: eliminated means "not in case file"
    const w = this.ownerWeights?.get(key);
    if(w){
      w.set(CASE_FILE_ID, AI_CFG.sherlock.weightFloor);
      this.clampAndNormalizeWeights(key);
    }
  }

  /* SUBSECTION: Query helpers */
  /* Brief: Small helpers for cleared checks, remaining candidates, and refutation matching. */
  /* Detailed:
     - What it does: isCleared checks seen set; possibleSet lists uncleared candidates; hasAnyOf finds matching cards in hand.
     - What depends on it: Suggestion/refutation flow and AI selection logic.
     - What breaks if changed: Players may fail to refute correctly or AI may choose invalid targets.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Category comparisons and predicates.
  */
  isCleared(type,name){return this.seen.has(this.cardKey(type,name));}
  possibleSet(type){
    const list=type==='Suspect'?SUSPECTS:type==='Weapon'?WEAPONS:ROOMS;
    return list.filter(n=>!this.isCleared(type,n));
  }
  hasAnyOf(triple){
    return triple.filter(t=>this.hand.some(c=>c.type===t.type&&c.name===t.name));
  }

  /* SUBSECTION: addRefuteConstraint(refuterId, cards) */
  /* Brief: Stores “refuter has ONE of these” and triggers propagation. */
  /* Detailed:
     - What it does: Converts cards to cardKey Set, pushes {refuterId, keys}, logs in observer mode, then propagateConstraints().
     - What depends on it: Smart/Sherlock inference and observer deductions log.
     - What breaks if changed: Deductions stop or become wrong; log gating may spam or go silent.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Constraint object shape and when propagation is invoked.
  */
  addRefuteConstraint(refuterId,cards){
    const keys=new Set(cards.map(c=>this.cardKey(c.type,c.name)));
    this.constraints.push({refuterId,keys});

    // ✅ Smart-level reasoning log (observer mode): "X has one of these"
    if(this.gameRef?.observerMode && (this.gameRef.aiDifficulty==='smart' || this.gameRef.aiDifficulty==='sherlock')){
      const me = this.gameRef.players?.[this.id]?.name ?? `P${this.id}`;
      const who = this.gameRef.players?.[refuterId]?.name ?? `P${refuterId}`;
      const list = [...keys].join(', ');
      this.gameRef.obs(`🧠 ${me}: Constraint added → ${who} must hold ONE of { ${list} }`, { byPlayerId: this.id });
    }

    this.propagateConstraints();
  }

  /* SUBSECTION: propagateConstraints() */
  /* Brief: Reduces constraints until stable; deduces exact ownership when only one key remains. */
  /* Detailed:
     - What it does: Walks constraints backwards; removes satisfied; prunes keys owned by others or forbidden by notOwners; deduces when size becomes 1; drops when size becomes 0.
     - What depends on it: Smart/Sherlock deduction correctness and speed.
     - What breaks if changed: Missed deductions, wrong owners, or inference getting stuck.
     ✅ Safe to edit: Comments only.
     ⚠️ Dangerous to edit: Loop bounds, splice logic, and deduction branch.
  */
  propagateConstraints(){
    let changed=true;
    while(changed){
      changed=false;
      for(let i=this.constraints.length-1;i>=0;i--){
        const c=this.constraints[i];
        // If we already know a card owned by refuter, satisfied
        let satisfied=false;
        for(const k of c.keys){
          const owner=this.knownOwners.get(k);
          if(owner===c.refuterId){satisfied=true;break;}
        }
        if(satisfied){ this.constraints.splice(i,1); changed=true; continue; }

        // Prune keys that are owned by others, or cannot be owned by refuter (negative knowledge)
        for(const k of [...c.keys]){
          const owner=this.knownOwners.get(k);
          if(owner!==undefined&&owner!==null&&owner!==c.refuterId){
            c.keys.delete(k); changed=true; continue;
          }
          const noSet = this.notOwners.get(k);
          if (noSet && noSet.has(c.refuterId)) {
            c.keys.delete(k); changed = true;
          }
        }

        // If only one remains -> deduce ownership
        if(c.keys.size===1){
          const [onlyKey]=c.keys;

          this.seen.add(onlyKey);
          this.knownOwners.set(onlyKey,c.refuterId);

          // provenance: deduced
          if(!this.own.has(onlyKey)){
            this.knowledgeMeta.set(onlyKey,{status:'deduced',ownerId:c.refuterId});
          }

          // ✅ Smart + Sherlock deduction log (observer mode): collapse -> must own
          if(this.gameRef?.observerMode && (this.gameRef.aiDifficulty==='smart' || this.gameRef.aiDifficulty==='sherlock')){
            const me = this.gameRef.players?.[this.id]?.name ?? `P${this.id}`;
            const ownerName = this.gameRef.players?.[c.refuterId]?.name ?? `P${c.refuterId}`;
            this.gameRef.obs(`🧠 ${me}: Deduction → ${ownerName} MUST own ${onlyKey} (only option left in constraint).`, { byPlayerId: this.id });
          }

          this.constraints.splice(i,1);
          changed=true; continue;
        }

        // If impossible set -> drop
        if(c.keys.size===0){
          this.constraints.splice(i,1); changed=true;
        }
      }
    }
  }

/* SECTION: Mild inference note + Sherlock++ learning hooks (refute/no-refute pattern updates) */

  /* SUBSECTION: noteNoRefute(playerId, triple) */
  /* Brief: Penalises a player's ownership probability for each card when they fail to refute a triple. */
  /* Detailed:
     - What it does: For each card, scales that player's weight by weightPenaltyNoRefute, then normalizes.

  noteNoRefute(playerId,triple){

        const who = this.gameRef.players[playerId]?.name ?? `P${playerId}`;

      }

      /* SUBSECTION: Observer focus log (Sherlock only) — “signal” line */
      /* Brief: Records the no-refute event context for the deduction trail. */
      /* Detailed:
         - What it does: Logs the triple card keys that triggered the penalty update.

         ✅ Safe to edit: Comments only.

      */
      if(this.gameRef?.observerMode && this.gameRef.aiDifficulty==='sherlock' && this.id===this.gameRef.observerFocusId){
        const who = this.gameRef.players[playerId]?.name ?? `P${playerId}`;
        this.gameRef.obs(`🧠 NO-REFUTE signal: ${who} could not refute (${triple.map(c=>this.cardKey(c.type,c.name)).join(', ')}). Downweighted ownership.`, { byPlayerId: this.id });
      }

  }

  /* SUBSECTION: noteRefutePattern(refuterId, triple) */
  /* Brief: Slightly boosts a refuter's ownership probability for each card in the triple and tracks frequency. */
  /* Detailed:
     - What it does: Increments refutationCounts for each card, adds weightBoostRefutePattern to that refuter's weight, then normalizes.
     - What depends on it: Sherlock pattern learning and observer focus logging.
     - What breaks if changed: Over/under boosting changes AI behaviour; breaking counts breaks “memory” feel.
     ✅ Safe to edit: Comments only.

  noteRefutePattern(refuterId,triple){

      const key=this.cardKey(c.type,c.name);

      const beforeOwn  = this._pOwner(c, refuterId);
      const w=this.ownerWeights.get(key);
      if(!w) continue;
      // pattern memory
      const cntMap = this.refutationCounts.get(key) || new Map();
      cntMap.set(refuterId, (cntMap.get(refuterId) || 0) + 1);
      this.refutationCounts.set(key, cntMap);

      const cur=w.get(refuterId) ?? 0.0001;
      w.set(refuterId, cur + AI_CFG.sherlock.weightBoostRefutePattern);

      */
      if(this.gameRef?.observerMode && this.gameRef.aiDifficulty==='sherlock' && this.id===this.gameRef.observerFocusId){
        const who = this.gameRef.players[refuterId]?.name ?? `P${refuterId}`;
        const afterCase = this._pCaseNorm(c);
        const afterOwn  = this._pOwner(c, refuterId);
        this.gameRef.obs(`🧠 Update (refute by ${who}): ${c.type}:${c.name} → P(case-file) ${this._pct(beforeCase)}→${this._pct(afterCase)}, P(${who}) ${this._pct(beforeOwn)}→${this._pct(afterOwn)} (boosted refuter).`, { byPlayerId: this.id });
      }

      /* SUBSECTION: Placeholder / note for future logging detail */
      /* Brief: This block is intentionally empty except for comments. */
      /* Detailed:

      if(this.gameRef?.observerMode && this.gameRef.aiDifficulty==='sherlock' && this.id===this.gameRef.observerFocusId){
        const who = this.gameRef.players[refuterId]?.name ?? `P${refuterId}`;
