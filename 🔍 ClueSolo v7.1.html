/* SECTION: renderPlayers(game) — Players panel list renderer
   Brief: Rebuilds the Players panel UI each render: name/role, location, eliminated flag, and “active” turn marker.
   Detailed:
     - What it does:
       - Clears #playersBox then creates a row per player with left/right columns.
       - Left column shows the player label + current room + optional eliminated badge.
       - Right column shows “active” pill for the current turn (unless gameOver), otherwise a placeholder pill.
       - Observer mode: labels the observer focus player as “Observer Focus (name)”.
     - What depends on it:
       - DOM element ID: playersBox must exist.
       - CSS classes: pill / pill good / pill bad are used inside innerHTML for styling.
       - State: game.turnIndex, game.gameOver, game.observerMode, game.observerFocusId, p.location, p.eliminated.
     - What breaks if changed:
       - Changing 'playersBox' breaks rendering (null element / empty UI).
       - Changing class names ('pill', 'good', 'bad') breaks styling for status badges.
       - Changing label logic can confuse observer focus and “You (…)” labeling.
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any IDs/class strings in innerHTML and any logic that determines active/observer labels.
*/
function renderPlayers(game){
  const box=el('playersBox');box.innerHTML='';
  game.players.forEach((p,idx)=>{
    const div=document.createElement('div');
    div.style.display='flex';div.style.justifyContent='space-between';
    div.style.alignItems='center';div.style.padding='6px 0';
    div.style.borderBottom='1px solid rgba(255,255,255,.06)';
    const left=document.createElement('div');
    let label;
    if(game.observerMode && p.id===game.observerFocusId) label = `Observer Focus (${p.name})`;
    else label = p.isHuman ? `You (${p.name})` : p.name;
    left.innerHTML=`<b>${label}</b> <span style="color:var(--muted);font-size:12px;">@ ${p.location}</span> ${p.eliminated?`<span class="pill bad" style="margin-left:6px;">eliminated</span>`:''}`;
    const right=document.createElement('div');
    const isTurn=idx===game.turnIndex && !game.gameOver;
    right.innerHTML=isTurn?`<span class="pill good">active</span>`:`<span class="pill">—</span>`;
    div.appendChild(left);div.appendChild(right);box.appendChild(div);
  });
}

/* SECTION: renderHand(game) — “Your Cards” panel renderer
   Brief: Clears and redraws the human player’s hand as sorted badge pills.
   Detailed:
     - What it does:
       - Reads game.players[0].hand, sorts by type then name, and creates a pill badge per card.
       - Uses displayCardName() so suspect titles render nicely (e.g., Rev. Green).
       - Shows a fallback “(no cards?)” pill if the hand is empty.
     - What depends on it:
       - DOM element with id="handBox" must exist.
       - Card objects must have the shape {type, name}.
       - displayCardName(type,name) must stay compatible with those types.
     - What breaks if changed:
       - Changing the DOM id or clearing logic stops the hand from rendering/refreshing.
       - Changing sort/comparison logic can reorder cards (UX change).
       - Changing the badge class names breaks CSS styling of the pills.
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any code, DOM id 'handBox', class strings, or assumptions about card object shape.
*/
function renderHand(game){
  const you=game.players[0];
  const box=el('handBox');box.innerHTML='';
  const sorted=[...you.hand].sort((a,b)=>a.type.localeCompare(b.type)||a.name.localeCompare(b.name));
  sorted.forEach(c=>{
    const badge=document.createElement('div');
    badge.className='pill good';badge.style.display='inline-block';badge.style.margin='4px 6px 0 0';
    badge.textContent=`${c.type}: ${displayCardName(c.type,c.name)}`;
    box.appendChild(badge);
  });
  if(!sorted.length) box.innerHTML=`<span class="pill">(no cards?)</span>`;
}


/* SECTION: renderNotebook(game) — manual checklist UI (ticks + per-item notes)
   Brief: Builds the 3 checklists (Suspects/Weapons/Rooms) with checkbox + label + text note for each entry.
   Detailed:
     - What it does:
       - Defines icon maps (uses global SUSPECT_ICON/WEAPON_ICON if present, else defaults).
       - Loads saved checklist ticks and note text (loadChecklist/loadCheckNotes).
       - Renders each category list into its target container (noteSuspects/noteWeapons/noteRooms).
       - Persists changes: checkbox onchange saves ticks; text oninput saves note text.
     - What depends on it:
       - Storage helpers: loadChecklist/saveChecklist and loadCheckNotes/saveCheckNotes.
       - DOM ids: noteSuspects, noteWeapons, noteRooms must exist.
       - CSS classes used by layout/styling: noteitem, cleared, name, noteText, ico.
       - Key format `${type}:${name}` must remain consistent with storage + other notebook code.
     - What breaks if changed:
       - Changing `${type}:${name}` key format breaks persistence and “cleared” matching.
       - Renaming DOM ids or classes breaks rendering/styling.
       - Changing event handlers can stop saving or cause re-render loops to fail.
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any executable code, key format, DOM ids, class names, or persistence calls.
*/
function renderNotebook(game){
  // Reuse global icon maps if they exist; otherwise built-ins.
  const SUS_ICON = (typeof SUSPECT_ICON !== 'undefined') ? SUSPECT_ICON : {
    "Green": "🎩","Mustard": "🎖️","Scarlet": "💋","Peacock": "💎","Plum": "💼","White": "👜"
  };
  const WEP_ICON = (typeof WEAPON_ICON !== 'undefined') ? WEAPON_ICON : {
    "Candlestick":"🕯️","Dagger":"🗡️","Lead Pipe":"🦯","Revolver":"🔫","Rope":"🪢","Wrench":"🔧"
  };
  const ROOM_ICON_LOCAL = {
    "Study": "📝","Hall":"🧥","Lounge":"🛋️","Library":"📖","Billiard Room":"🎱","Dining Room":"🍽️","Conservatory":"🪴","Ballroom":"💃","Kitchen":"🥩"
  };

  const chk=loadChecklist(); const notes=loadCheckNotes();

  /* SUBSECTION: renderList(targetId,type,list) — per-category list builder
     Brief: Renders one checklist category into its target container.
     Detailed:
       - What it does:
         - Creates one row per item with checkbox + name label (+ optional icon) + note input.
         - Checkbox onchange updates checklist storage then re-renders to apply strike-through.
         - Note input oninput updates notes storage without forcing full re-render.
       - What depends on it:
         - Consistent key format `${type}:${name}` for both chk and notes objects.
         - CSS grid layout for .noteitem and input class .noteText.
       - What breaks if changed:
         - Changing key format breaks saved data mapping.
         - Changing class names breaks layout and “cleared” styling.
         - Removing renderNotebook(game) call after saving ticks can leave UI out of sync.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: Key construction, DOM ids, class names, and persistence + rerender logic.
  */
  const renderList=(targetId,type,list)=>{
    const box=el(targetId); box.innerHTML='';
    list.forEach(name=>{
      const key=`${type}:${name}`; const checked=!!chk[key];
      const row=document.createElement('div'); row.className='noteitem'+(checked?' cleared':'');
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=checked;
      cb.setAttribute('aria-label',`Mark ${displayCardName(type,name)} as cleared`);
      cb.style.marginTop='2px';
      cb.onchange=()=>{
        const state=loadChecklist();
        if(cb.checked) state[key]=true; else delete state[key];
        saveChecklist(state); renderNotebook(game);
      };
      const nameSpan=document.createElement('span'); nameSpan.className='name';
      let icon=''; if(type==='Suspect') icon=SUS_ICON[name]||''; else if(type==='Weapon') icon=WEP_ICON[name]||''; else if(type==='Room') icon=ROOM_ICON_LOCAL[name]||'';
      const label=displayCardName(type,name);
      nameSpan.innerHTML=(icon?`<span class="ico" aria-hidden="true">${icon}</span>`:'')+label;

      const text=document.createElement('input'); text.type='text'; text.className='noteText';
      text.placeholder='Add a note…'; text.value=notes[key]||'';
      text.oninput=()=>{ const s=loadCheckNotes(); s[key]=text.value; saveCheckNotes(s); };

      row.appendChild(cb); row.appendChild(nameSpan); row.appendChild(text); box.appendChild(row);
    });
  };

  renderList('noteSuspects','Suspect',SUSPECTS);
  renderList('noteWeapons','Weapon',WEAPONS);
  renderList('noteRooms','Room',ROOMS);
}

/* SECTION: renderObserverCasebook(game) — Observer mode casebook (status + Sherlock probabilities + deductions log)
   Brief: Renders the right-panel casebook for observer mode, showing each item’s status (own/seen/deduced/eliminated) and (Sherlock) case-file probability bars.
   Detailed:
     - What it does:
       - Switches the right-panel header to “Observer Casebook”, then rebuilds the three lists (Suspects/Weapons/Rooms) for the focus player.
       - Derives per-item status from focus.own / focus.seen / focus.knownOwners / focus.knowledgeMeta.
       - In Sherlock difficulty, computes a per-item case-file probability (preferring caseFileProbNormalized) and displays a progress bar.
       - In Smart/Sherlock, appends an observer deductions log under Rooms and auto-scrolls it to latest.
     - What depends on it:
       - DOM IDs: noteSuspects, noteWeapons, noteRooms and selector '.rightPanel h2' must exist.
       - Focus player fields/methods: cardKey(), own, seen, knownOwners, knowledgeMeta; (Sherlock) ownerWeights, caseFileProbNormalized.
       - CSS classes: noteitem/cleared/name/ico/probWrap/probBar/probPct/log; and CSS variables used in inline styles.
     - What breaks if changed:
       - Changing IDs/class names breaks rendering/styling; changing status mapping can make the observer UI misleading.
       - Changing solProb() math or bar sizing changes meaning/UX of Sherlock probabilities.
       - Removing the deductions log creation or auto-scroll affects observer-mode readability.
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any executable logic (status/probability mapping, DOM IDs/class strings, log creation, and auto-scroll timing).
*/
function renderObserverCasebook(game){
  const focus = game.players[game.observerFocusId];
  const boxSus = el('noteSuspects');
  const boxWep = el('noteWeapons');
  const boxRoom = el('noteRooms');

  // Replace panel headers dynamically (optional)
  const rightPanel = document.querySelector('.rightPanel h2');
  if(rightPanel) rightPanel.textContent = 'Observer Casebook';

  // Ensure containers exist
  if(!boxSus || !boxWep || !boxRoom) return;

  // Build checklist rows
  const playersById = new Map(game.players.map(p=>[p.id,p.name]));

  /* SUBSECTION: statusInfo(type,name) — derive UI status label from focus knowledge
     Brief: Computes whether an item is crossed off and what label to display (own/seen/deduced/eliminated/unknown).
     Detailed:
       - What it does: Checks OWN first, then knowledgeMeta provenance (seen/deduced/eliminated), then fallback seen+knownOwners, else unknown.
       - What depends on it: knowledgeMeta.status strings and ownerId values; focus.own/seen/knownOwners.
       - What breaks if changed: Incorrect status labels mislead observer reasoning and can hide remaining candidates.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: Status string comparisons, ownership lookups, and return object shape.
  */
  const statusInfo = (type,name)=>{
    const key = focus.cardKey(type,name);

    // OWN
    if(focus.own.has(key)) return { crossed:true, label:'(own)', cls:'own' };

    const meta = focus.knowledgeMeta.get(key);

    // SEEN / DEDUCED / ELIMINATED (provenance-first)
    if(meta?.status === 'seen'){
      return { crossed:true, label:`(seen: ${playersById.get(meta.ownerId) ?? 'unknown'})`, cls:'seen' };
    }
    if(meta?.status === 'deduced'){
      return { crossed:true, label:`(deduced: ${playersById.get(meta.ownerId) ?? 'unknown'})`, cls:'deduced' };
    }
    if(meta?.status === 'eliminated'){
      return { crossed:true, label:`(eliminated)`, cls:'elim' };
    }

    // If it is "seen" with known owner but meta missing
    if(focus.seen.has(key)){
      const ownerId = focus.knownOwners.get(key);
      if(ownerId !== undefined) return { crossed:true, label:`(seen: ${playersById.get(ownerId) ?? 'unknown'})`, cls:'seen' };
      return { crossed:true, label:`(eliminated)`, cls:'elim' };
    }

    // Unknown
    return { crossed:false, label:'', cls:'' };
  };

  /* SUBSECTION: solProb(type,name) — Sherlock-only case-file probability for progress bars
     Brief: Returns a probability (0..1) used to size the Sherlock progress bar for an item.
     Detailed:
       - What it does: Returns null unless sherlock; returns 0 for crossed items; prefers caseFileProbNormalized() if present; else falls back to raw ownerWeights CASE_FILE_ID.
       - What depends on it: focus.caseFileProbNormalized(), focus.ownerWeights, CASE_FILE_ID constant, and focus.seen.
       - What breaks if changed: Probability bars become inconsistent with Sherlock beliefs or misleading to the observer.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: Probability math, fallback logic, and Map access keys.
  */
  // Sherlock: probability of being in the case file
  const solProb = (type,name)=>{
    if(game.aiDifficulty!=='sherlock') return null;
    const key = focus.cardKey(type,name);

    // If it’s crossed off, treat as 0 chance
    if(focus.seen.has(key)) return 0;

    // ✅ Use category-normalised probability so each category sums to 1 across remaining candidates
    if(typeof focus.caseFileProbNormalized === 'function'){
      return focus.caseFileProbNormalized(type, name);
    }

    // Fallback (shouldn't happen): raw value
    const w = focus.ownerWeights?.get(key);
    if(!w) return 0.0;
    const pCase = w.get(CASE_FILE_ID) ?? 0;
    return Math.max(0, Math.min(1, pCase));
  };

  const SUS_ICON = {"Green":"🎩","Mustard":"🎖️","Scarlet":"💋","Peacock":"💎","Plum":"💼","White":"👜"};
  const WEP_ICON = {"Candlestick":"🕯️","Dagger":"🗡️","Lead Pipe":"🦯","Revolver":"🔫","Rope":"🪢","Wrench":"🔧"};

  /* SUBSECTION: renderList(target, type, list, iconMap, roomIcons=false) — build one observer list
     Brief: Renders one category list into the target element, optionally including Sherlock probability bars.
     Detailed:
       - What it does: Clears target, then builds .noteitem rows with name (and optional icon), optional prob bar, and status label.
       - What depends on it: statusInfo(), solProb(), and the CSS class names used for layout and bar styling.
       - What breaks if changed: Grid column layouts can break; class-name changes can remove styling; wrong DOM structure can misalign rows.
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: gridTemplateColumns logic, class strings, and DOM assembly order.
  */
  const renderList = (target, type, list, iconMap, roomIcons=false)=>{
    target.innerHTML = '';
    for(const name of list){
      const info = statusInfo(type,name);
      const p = solProb(type,name); // sherlock only

      const row = document.createElement('div');
      row.className = 'noteitem' + (info.crossed ? ' cleared':'');
      row.style.gridTemplateColumns = (game.aiDifficulty==='sherlock')
       ? 'auto 1fr 160px auto'  // icon+name | prob | status
       : 'auto 1fr auto';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'name';
      const ico = roomIcons ? (ROOM_ICON[name] || '') : (iconMap?.[name] || '');
      nameSpan.innerHTML = (ico ? `<span class="ico" aria-hidden="true">${ico}</span>`:'') + displayCardName(type,name);

      // Sherlock progress bar
      let probWrap = null;
      if(game.aiDifficulty==='sherlock'){
        probWrap = document.createElement('div');
        probWrap.className = 'probWrap';
        const bar = document.createElement('div');
        bar.className = 'probBar';
        bar.style.width = `${Math.round((p||0)*100)}%`;
        const pct = document.createElement('div');
        pct.className = 'probPct';
        pct.textContent = `${Math.round((p||0)*100)}%`;
        probWrap.appendChild(bar);
        probWrap.appendChild(pct);
      }

      const status = document.createElement('span');
      status.style.color = 'var(--muted)';
      status.style.fontSize = '12px';
      status.style.whiteSpace = 'nowrap';
      status.textContent = info.label;

      // assemble
      if(game.aiDifficulty==='sherlock'){
        row.appendChild(nameSpan);
        row.appendChild(probWrap);
        row.appendChild(status);
      }else{
        row.appendChild(nameSpan);
        row.appendChild(status);
      }
      target.appendChild(row);
    }
  };

  renderList(boxSus, 'Suspect', SUSPECTS, SUS_ICON, false);
  renderList(boxWep, 'Weapon', WEAPONS, WEP_ICON, false);
  renderList(boxRoom,'Room',  ROOMS,  null,   true);

  // Smart/Sherlock: show deductions log under Rooms
  // (or create a dedicated container if you prefer)
  /* SUBSECTION: Observer deductions log (Smart/Sherlock) — append and auto-scroll
     Brief: Shows a rolling reasoning log under Rooms in observer mode for smart/sherlock difficulties.
     Detailed:
       - What it does: Creates #observerDeduceLog once, appends under Rooms, fills with recent obsLog lines, and auto-scrolls to latest.
       - What depends on it: game.obsLog content and the 'log' CSS class for scroll styling.
       - What breaks if changed: Log may not appear, may not update, or may not auto-scroll (hurts observer UX).
     ✅ Safe to edit: Comments/blank lines only.
     ⚠️ Dangerous to edit: Element ID 'observerDeduceLog', append target, slice/join logic, and setTimeout scroll.
  */
  if(game.aiDifficulty==='smart' || game.aiDifficulty==='sherlock'){
    const logId = 'observerDeduceLog';
    let logBox = document.getElementById(logId);
    if(!logBox){
      logBox = document.createElement('div');
      logBox.id = logId;
      logBox.className = 'log';
      logBox.style.marginTop = '10px';
      boxRoom.parentElement?.appendChild(logBox);
    }
    logBox.textContent = (game.obsLog && game.obsLog.length)
     ? game.obsLog.slice(-200).join('\n')
     : '(deductions log will appear here)';

    // ✅ Auto-scroll to the latest entry
    setTimeout(() => {
      logBox.scrollTop = logBox.scrollHeight;
    }, 0);
  }else{
    // Basic: remove log if present
    const logBox = document.getElementById('observerDeduceLog');
    if(logBox) logBox.remove();
  }
}

/* SECTION: renderBoard(game) — EXACT copy from your uploaded file (startup-safe)
   Brief: Board renderer that uses literal JavaScript operators and literal HTML tags inside template strings.
   Detailed:
     - What it does: Clears #board, builds room tiles with tokens, then creates the centre tile and defines makeRoomToken().
     - What depends on it: The JS in <script> must contain real operators (arrow functions, &&, comparisons), not HTML-encoded text, or the browser will stop parsing and prompts won’t appear.
     - What breaks if changed: Any operator corruption can halt the entire script at load.
   ✅ Safe to edit: Comments only.
   ⚠️ Dangerous to edit: Any executable code characters/operators or string markup.
*/
function renderBoard(game){
  const board=el('board');board.innerHTML='';
  const placeBox=(div,pos)=>{div.style.gridColumn=`${pos.col[0]} / ${pos.col[1]}`;div.style.gridRow=`${pos.row[0]} / ${pos.row[1]}`;};
  const activeSuspects=new Set(game.players.map(p=>p.suspect).filter(Boolean));
  const current=game.currentPlayer();
  const roomNames=['Study','Library','Billiard Room','Conservatory','Hall','Ballroom','Lounge','Dining Room','Kitchen'];

  roomNames.forEach(roomName=>{
    const div=document.createElement('div');
    div.className='room';
    const pos=BOARD_LAYOUT[roomName];
    if(pos) placeBox(div,pos);
    const here=current.isHuman && current.location===roomName;
    const reachable=current.isHuman && game.awaitingMove && game.reachable.has(roomName);
    if(here) div.classList.add('here');
    if(reachable) div.classList.add('reachable');

    const SUSPECT_ICON = {"Green":"🎩","Mustard":"🎖️","Scarlet":"💋","Peacock":"💎","Plum":"💼","White":"👜"};
    const suspectTokens = SUSPECTS
      .filter(s => (game.suspectLoc.get(s) || 'Hall') === roomName)
      .map(s => {
        const inactive = !activeSuspects.has(s);
        const cls = `token suspect ${slug(s)}${inactive ? ' inactive' : ''}`;
        const icon = SUSPECT_ICON[s] || "";
        const label = displaySuspect(s);
        return `<span class="${cls}" data-color="1" title="${label}">
                  <span class="ico" aria-hidden="true">${icon}</span>${label}
                </span>`;
      });

    const WEAPON_ICON = {"Candlestick":"🕯️","Dagger":"🗡️","Lead Pipe":"🦯","Revolver":"🔫","Rope":"🪢","Wrench":"🔧"};
    const weaponTokens = WEAPONS
      .filter(w => (game.weaponLoc.get(w) || '') === roomName)
      .map(w => {
        const cls = `token weapon ${slug(w)}`;
        const icon = WEAPON_ICON[w] || "";
        return `<span class="${cls}" data-color="1" title="${w}">
                  <span class="ico" aria-hidden="true">${icon}</span>${w}
                </span>`;
      });

    const tokensHTML=[...suspectTokens,...weaponTokens].join('')||`<span class="token" style="opacity:.6;">(empty)</span>`;
    const roomIcon = ROOM_ICON[roomName] || "";
    div.innerHTML = `<div class="title"><span class="ico" aria-hidden="true">${roomIcon}</span>${roomName}</div>
                     <div class="tokens">${tokensHTML}</div>`;
    if(current.isHuman && game.awaitingMove && reachable){
      const btn=document.createElement('button');btn.textContent='Move';
      btn.setAttribute('aria-label',`Move to ${roomName}`);btn.tabIndex=0;
      btn.onclick=()=>game.humanMoveTo(roomName);
      btn.onkeydown=(e)=>{if(e.key==='Enter'||e.key===' ') btn.click();};
      div.appendChild(btn);
    }
    board.appendChild(div);
  });

  const center=document.createElement('div');center.className='room center';placeBox(center,CENTER_CELL);

  const makeRoomToken = (roomName) => {
    if(!roomName) return '';
    const icon = ROOM_ICON[roomName] || '🏷️';
    // Render like other tokens to keep consistent sizing
    return `<span class="token roomtok" data-color="1" title="${roomName}"
                  style="--token-color: rgba(248,250,252,.85);">
              <span class="ico" aria-hidden="true">${icon}</span>${roomName}
            </span>`;
  };

/* SECTION: Centre Tile Rendering (Default / Trial / Convicted + Holding Tokens)
   Brief: Builds the centre tile’s title/body based on current trial/convicted state, then injects any held suspect/weapon tokens plus an optional room token.
   Detailed:
     - What it does:
       - Sets default “CLASSIFIED FILES” title + “(sealed)” body.
       - If a trial is active (ACCUSED / NOT GUILTY), switches centre styling + body to show accusation details.
       - Else if the game is over and someone is convicted, switches to CONVICTED styling + body and shows winner/details.
       - Collects any suspects/weapons currently parked in HOLDING_CELL_ID and renders them as token chips.
       - Adds a “room token” for trial/convicted so the centre tile always shows the accused/solution room.
       - Writes the final composed HTML into the centre tile and appends it to the board.
     - What depends on it:
       - game.trial.stage strings ('accused','notguilty') and game.convicted shape ({suspect,weapon,room,winner}).
       - HOLDING_CELL_ID-based token parking (suspectLoc/weaponLoc Maps) for showing held pieces.
       - Token CSS classes ('token', 'suspect', 'weapon', 'dot', etc.) and slug() naming for consistent styling.
     - What breaks if changed:
       - Changing stage strings or convicted/trial object shapes can desync centre-tile visuals from game state.
       - Changing token markup/class strings can break token coloring/layout and centre tile readability.
       - Removing the roomToken logic can make trial/convicted centre state ambiguous (missing room context).
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any executable code, especially state checks, stage strings, object destructuring, and HTML templates.
*/
// Default centre tile
  let centerTitle = `<span class="ico" aria-hidden="true">${ROOM_ICON["Classified Files"] || "🕵️‍♂️"}</span>CLASSIFIED FILES`;
  let centerBody  = `<span class="token" style="opacity:.6;">(sealed)</span>`;

  // Determine centre state:
  // 1) Trial states (ACCUSED / NOT GUILTY)
  // 2) Game over (CONVICTED)
  if(game.trial && (game.trial.stage==='accused' || game.trial.stage==='notguilty')){
    const st = game.trial.stage;
    const { acc, by } = game.trial;

    if(st==='accused'){
      center.classList.add('accused');
      centerTitle = `<span class="ico" aria-hidden="true">👨‍⚖️</span>ACCUSED`;
      centerBody = `<div style="margin-top:6px;font-size:12px;color:var(--muted)">
        ${by ? `<div><b>By:</b> ${by}</div>` : ''}
        <div><b>Suspect:</b> ${displaySuspect(acc.suspect)}</div>
        <div><b>Weapon:</b> ${acc.weapon}</div>
        <div><b>Room:</b> ${acc.room}</div>
      </div>`;
    } else {
      center.classList.add('notguilty');
      centerTitle = `<span class="ico" aria-hidden="true">🕊</span>NOT GUILTY`;
      centerBody = `<div style="margin-top:6px;font-size:12px;color:var(--muted)">
        ${by ? `<div><b>By:</b> ${by}</div>` : ''}
        <div><b>Suspect:</b> ${displaySuspect(acc.suspect)}</div>
        <div><b>Weapon:</b> ${acc.weapon}</div>
        <div><b>Room:</b> ${acc.room}</div>
      </div>`;
    }
  }
  else if (game.gameOver && game.convicted) {
    const { suspect, weapon, room, winner } = game.convicted;
    center.classList.add('convicted');
    centerTitle = `<span class="ico" aria-hidden="true">👮‍♂️</span>CONVICTED`;
    centerBody = `<div style="margin-top:6px;font-size:12px;color:var(--muted)">
      ${winner ? `<div><b>By:</b> ${winner}</div>` : ''}
      <div><b>Suspect:</b> ${displaySuspect(suspect)}</div>
      <div><b>Weapon:</b> ${weapon}</div>
      <div><b>Room:</b> ${room}</div>
    </div>`;
  }

  // Tokens currently held in centre (suspect + weapon moved via HOLDING_CELL_ID)
  const holdingSus=SUSPECTS
    .filter(s=>game.suspectLoc.get(s)===HOLDING_CELL_ID)
    .map(s=>`<span class="token suspect ${slug(s)}" data-color="1" title="${displaySuspect(s)}"><span class="dot"></span>${displaySuspect(s)}</span>`);

  const holdingWep=WEAPONS
    .filter(w=>game.weaponLoc.get(w)===HOLDING_CELL_ID)
    .map(w=>`<span class="token weapon ${slug(w)}" data-color="1" title="${w}"><span class="dot"></span>${w}</span>`);

  // Room token for trial or convicted state
  let roomToken = '';
  if(game.trial && game.trial.acc) roomToken = makeRoomToken(game.trial.acc.room);
  else if(game.gameOver && game.convicted) roomToken = makeRoomToken(game.convicted.room);

  const centerTokens=[...holdingSus,...holdingWep, roomToken].filter(Boolean).join('');

  center.innerHTML=`<div class="title">${centerTitle}</div><div class="tokens">${centerTokens||centerBody}</div>`;
  board.appendChild(center);
}

/* SECTION: renderAll(game) — master UI render dispatcher
   Brief: Central “draw everything” function that keeps the UI in sync with the game model.
   Detailed:
     - What it does:
       - Re-renders the left panel (players + hand), then the right panel (observer casebook OR manual notebook),
         then the board (rooms + centre tile).
       - This is called throughout gameplay after state changes so the UI stays current.
     - What depends on it:
       - All render* functions it calls must exist and the target DOM IDs must be present (playersBox, handBox, note* boxes, board).
       - The observerMode flag controls which right-panel renderer is used.
     - What breaks if changed:
       - Changing call order can cause stale or confusing UI (e.g., board updates without corresponding panel updates).
       - Changing the observerMode branching can show the wrong panel or break observer mode completely.
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any executable logic, especially the observerMode branch and which renderers are called.
*/
function renderAll(game){
  renderPlayers(game);
  renderHand(game);
  if(game.observerMode) renderObserverCasebook(game);
  else renderNotebook(game);
  renderBoard(game);
}

/* SECTION: Startup boot sequence — create Game, gather setup, bind New Game, begin first turn
   Brief: Runs once on page load to initialise game settings, assign suspects, deal cards, and start the turn loop.
   Detailed:
     - What it does:
       - Clears prompt UI, shows the setup prompt, applies difficulty/observer settings, resets players.
       - In observer mode, forces Player 1 to be AI (prevents human-only prompts during play).
       - Prompts for a focus suspect, assigns suspects, runs game.setup() to deal cards and render initial state.
       - Binds the New Game button handler and begins the first turn.
       - On error, logs to console and shows a friendly error prompt.
     - What depends on it:
       - promptGameSetup(), normDiff(), resetPlayers(), promptHumanSuspect(), assignSuspects(), setup(), beginTurn().
       - DOM id 'btnNewGame' must exist for the click binding.
     - What breaks if changed:
       - Changing the order of calls can leave the game in an inconsistent state (e.g., beginTurn before setup).
       - Removing the observer-mode “Player 1 is AI” switch can re-enable human prompts in observer mode (behaviour change).
       - Breaking the try/catch can hide boot failures and make prompts disappear with no message.
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any executable code, especially the startup call sequence and observer-mode branching.
*/
/* Startup */
const game=new Game();
(async function start(){
  try{
    clearGameplayPrompt();
    const setup = await promptGameSetup();
    game.aiDifficulty = normDiff(setup.diff);
    game.observerMode = !!setup.observer;
    game.observerFocusId = 0;

    game.resetPlayers(setup.opp);

    // In observer mode, Player 1 is AI (no human prompts during play)
    if(game.observerMode){
      game.players[0].isHuman = false; // critical: prevents "human" refute prompts
      game.players[0].name = `Player 1`; // temporary until suspect assigned
    }

    // Choose focus suspect (optional but recommended)
    const pick = await promptHumanSuspect(SUSPECTS);
    // You can rename the prompt title/body if observer mode (see below)
    game.assignSuspects(pick);

    // After assignSuspects, set a nicer label for Player 1 in observer mode
    if(game.observerMode){
      game.players[0].name = displaySuspect(game.players[0].suspect); // keep consistent
    }

    game.setup();
    el('btnNewGame').onclick=()=>startNewGame(game);
    await game.beginTurn();
  }catch(e){
    console.error(e);
    await showInfoPrompt('Error',
      `<div style="color:#fca5a5"><b>${(e&&e.message)||'Unknown error'}</b></div>
       <div style="margin-top:8px;color:var(--muted);font-size:12px;">Check the browser console for details.</div>`);
  }
})();

/* SECTION: resetUIForSetup() — clears UI + saved checklist state before a new setup flow
   Brief: Resets visible UI panels and clears checklist persistence so a new game starts cleanly.
   Detailed:
     - What it does:
       - Clears prompt box, wipes log/players/hand/board and notebook containers.
       - Clears checklist + notes via clearChecklist/clearCheckNotes (wrapped in try/catch).
       - Resets status pills to “Turn: —” and “Location: —”.
     - What depends on it:
       - DOM IDs: log, playersBox, handBox, board, noteSuspects/noteWeapons/noteRooms, turnPill, locPill.
       - Checklist persistence helpers: clearChecklist() and clearCheckNotes().
     - What breaks if changed:
       - Removing clears can leave old UI/state visible, confusing the next game.
       - Changing IDs breaks the reset (stale content remains or code errors).
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any executable code, especially DOM IDs and the persistence clear calls.
*/
function resetUIForSetup() {
  clearGameplayPrompt();
  const logBox = el('log'); if (logBox) logBox.textContent = '';
  const playersBox = el('playersBox'); if (playersBox) playersBox.innerHTML = '';
  const handBox = el('handBox'); if (handBox) handBox.innerHTML = '';
  const board = el('board'); if (board) board.innerHTML = '';
  ['noteSuspects','noteWeapons','noteRooms'].forEach(id => {
    const box = el(id); if (box) box.innerHTML = '';
  });
  try { clearChecklist(); clearCheckNotes(); } catch (e) { console.warn('Checklist clear error (safe to ignore):', e); }
  const turnPill = el('turnPill'); if (turnPill) turnPill.textContent = 'Turn: —';
  const locPill  = el('locPill');  if (locPill)  locPill.textContent  = 'Location: —';
}

/* SECTION: startNewGame(game,{skipConfirm=false}={}) — new game flow (optional confirm + setup prompts)
   Brief: Runs the full “New Game” process: optional confirmation, UI reset, setup prompts, re-init, then begin turn loop.
   Detailed:
     - What it does:
       - If skipConfirm is false, shows a confirmation prompt (Cancel/New Game).
       - Resets UI and persistence, re-runs promptGameSetup(), sets difficulty/observer flags, resets players.
       - In observer mode, forces Player 1 to be AI, then prompts for focus suspect, assigns suspects, runs setup, and begins the first turn.
       - Re-binds the New Game button to this same flow.
     - What depends on it:
       - renderPrompt()/clearGameplayPrompt() for confirm UI.
       - promptGameSetup()/promptHumanSuspect()/assignSuspects()/setup()/beginTurn() for the actual new-game boot.
       - Observer-mode flags and “Player 1 is AI” line must remain intact for correct observer behaviour.
     - What breaks if changed:
       - Changing prompt IDs/flow can strand the user mid-setup.
       - Changing observer mode handling can reintroduce human-only prompts or desync labels.
       - Removing the resetUIForSetup() call can leave stale UI/persistence.
   ✅ Safe to edit: Comments/blank lines only.
   ⚠️ Dangerous to edit: Any executable code, especially confirm flow, setup sequencing, and observer-mode branching.
*/
async function startNewGame(game,{skipConfirm=false}={}){
  let ok=true;
  if(!skipConfirm){
    ok=await renderPrompt({
      title:'Start a New Game?',
      bodyHTML:`<div>This will restart the game and redeal all cards.</div>
      <div style="margin-top:10px;color:var(--muted);font-size:12px;">
      Any current turn progress will be lost.
      </div>`,
      actions:[
        {label:'Cancel',value:false,className:'secondary'},
        {label:'New Game',value:true,className:'danger'}
      ]
    });
    clearGameplayPrompt();
  }
  if(!ok) return;

  resetUIForSetup();
  const setup = await promptGameSetup();
  game.aiDifficulty = normDiff(setup.diff);
  game.observerMode = !!setup.observer;
  game.observerFocusId = 0;

  game.resetPlayers(setup.opp);

  // In observer mode, Player 1 is AI (no human prompts during play)
  if(game.observerMode){
    game.players[0].isHuman = false; // critical: prevents "human" refute prompts
    game.players[0].name = `Player 1`; // temporary until suspect assigned
  }

  // Choose focus suspect (optional but recommended)
  const pick = await promptHumanSuspect(SUSPECTS);
  // You can rename the prompt title/body if observer mode (see below)
  game.assignSuspects(pick);

  // After assignSuspects, set a nicer label for Player 1 in observer mode
  if(game.observerMode){
    game.players[0].name = displaySuspect(game.players[0].suspect); // keep consistent
  }

  game.setup();
  el('btnNewGame').onclick=()=>startNewGame(game);
  await game.beginTurn();
}
</script>
